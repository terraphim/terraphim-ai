{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="has-text-centered">
      <h1 class="title is-2">{{ section.title }}</h1>
      <p class="subtitle is-4">{{ section.description }}</p>
      <figure class="image is-flex is-justify-content-center is-align-items-center" style="margin-bottom: 1.5rem;">
        <a href="/logo-animation/" title="View animated logo">
          <iframe
            src="/logo-animation/"
            width="320"
            height="360"
            style="border: none; border-radius: 8px; overflow: hidden; pointer-events: none;"
            loading="lazy"
            aria-label="Animated Terraphim AI logo"
          ></iframe>
        </a>
      </figure>
      {{ macros:: social_links( social_config=config.extra.social) }}
    </div>
    <div class="content">
      {{ section.content | safe }}
    </div>
</div>
</section>
{% endblock %}
