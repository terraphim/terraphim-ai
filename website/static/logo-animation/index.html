<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terraphim AI - Animated Logo</title>
  <meta name="description" content="Terraphim AI animated logo - stellated polygon mandala variation" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgb(15, 12, 10);
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    #logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #logo-container canvas {
      display: block;
    }

    .brand-text {
      margin-top: 1.5rem;
      text-align: center;
      color: rgba(232, 128, 28, 0.85);
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .brand-text .subtitle {
      display: block;
      margin-top: 0.3rem;
      color: rgba(245, 197, 24, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
    }

    .hint {
      position: fixed;
      bottom: 1rem;
      color: rgba(200, 120, 40, 0.25);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div id="logo-container"></div>
  <div class="brand-text">
    Terraphim AI
    <span class="subtitle">Privacy Preserving Intelligence</span>
  </div>
  <div class="hint">click to regenerate</div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
