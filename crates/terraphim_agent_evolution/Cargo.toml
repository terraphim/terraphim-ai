[package]
name = "terraphim_agent_evolution"
version = "1.20.2"
edition.workspace = true
description = "Agent evolution system for Terraphim AI"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "agents", "evolution", "learning", "adaptation"]
license = "MIT"
readme = "../../README.md"

[dependencies]
async-trait = { workspace = true }

chrono = { workspace = true, features = ["serde"] }

futures = "0.3"
log = { workspace = true }

regex = "1.12"
serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }

thiserror = { workspace = true }

tokio = { workspace = true, features = ["full"] }

uuid = { workspace = true, features = ["v4", "serde"] }


# Terraphim dependencies
terraphim_persistence = { path = "../terraphim_persistence", version = "1.15.0" }
terraphim_types = { version = "1.15.0", registry = "terraphim" }

[dev-dependencies]
tokio-test = "0.4"
