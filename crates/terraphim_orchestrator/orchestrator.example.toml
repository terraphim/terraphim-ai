# orchestrator.example.toml -- AI Dark Factory Agent Fleet
#
# Copy to orchestrator.toml and adjust paths for your environment.
# This configures 3 agents (one per layer) for initial deployment.

working_dir = "/Users/alex/projects/terraphim/terraphim-ai"

[nightwatch]
eval_interval_secs = 300        # 5 minutes
minor_threshold = 0.10          # 10-20% drift = Minor (log warning)
moderate_threshold = 0.20       # 20-40% drift = Moderate (reload config)
severe_threshold = 0.40         # 40-70% drift = Severe (restart agent)
critical_threshold = 0.70       # >70% drift = Critical (pause + escalate)

[compound_review]
schedule = "0 2 * * *"          # 2 AM daily
max_duration_secs = 1800        # 30 minutes
repo_path = "/Users/alex/projects/terraphim/terraphim-ai"
create_prs = false              # Dry run for first 2 weeks

# --- Safety Layer (always running) ---

[[agents]]
name = "security-sentinel"
layer = "Safety"
cli_tool = "codex"
task = "Continuously scan for CVEs and security vulnerabilities in dependencies. Run cargo audit and report findings."
# model = "o3"                    # Optional: explicit model override. Omit to use keyword routing.
capabilities = ["security", "vulnerability-scanning"]
max_memory_bytes = 2147483648   # 2GB
# budget_monthly_cents = 5000  # $50/month (omit for subscription CLIs)

# --- Core Layer (scheduled) ---

[[agents]]
name = "upstream-synchronizer"
layer = "Core"
cli_tool = "codex"
task = "Sync with upstream repositories. Check for new releases of key dependencies."
schedule = "0 3 * * *"          # 3 AM daily
capabilities = ["sync", "dependency-management"]

# --- Growth Layer (on-demand) ---

[[agents]]
name = "code-reviewer"
layer = "Growth"
cli_tool = "claude"
task = "Review the latest PR for code quality, security issues, and adherence to project conventions."
capabilities = ["code-review", "architecture"]

# --- Flow DAG Examples ---

# Example: Compound Review v2 using Flow DAG
# This replaces the legacy compound_review with a multi-step DAG workflow
[[flows]]
name = "compound-review-v2"
schedule = "0 2 * * *"          # 2 AM daily
repo_path = "/Users/alex/projects/terraphim/terraphim-ai"
base_branch = "main"
timeout_secs = 7200

[[flows.steps]]
name = "gather-changes"
kind = "action"
command = "git diff main..HEAD --name-only > /tmp/changed_files.txt && cat /tmp/changed_files.txt"
timeout_secs = 300
on_fail = "abort"

[[flows.steps]]
name = "analyze-architecture"
kind = "agent"
cli_tool = "claude"
model = "sonnet"
task = "Review the architecture changes in the modified files. Focus on design patterns, API contracts, and system boundaries."
timeout_secs = 900
on_fail = "skip_failed"

[[flows.steps]]
name = "check-security"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p5"
task = "Perform a security audit on the changed code. Look for injection vulnerabilities, unsafe deserialization, and authentication bypasses."
timeout_secs = 600
on_fail = "continue"

[[flows.steps]]
name = "gate-approval"
kind = "gate"
condition = "{{steps.analyze-architecture.exit_code}} == 0"

[[flows.steps]]
name = "checkpoint-completed"
kind = "checkpoint"
