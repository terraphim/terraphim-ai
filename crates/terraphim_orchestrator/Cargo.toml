[package]
name = "terraphim_orchestrator"
version = "1.8.0"
edition = "2021"
authors = ["Terraphim Team"]
description = "AI Dark Factory orchestrator wiring spawner, router, supervisor into a reconciliation loop"
license = "Apache-2.0"
repository = "https://github.com/terraphim/terraphim-ai"

[dependencies]
# Terraphim internal crates
terraphim_spawner = { path = "../terraphim_spawner", version = "1.0.0" }
terraphim_router = { path = "../terraphim_router", version = "1.0.0" }
terraphim_tracker = { path = "../terraphim_tracker", version = "0.1.0" }
terraphim_types = { path = "../terraphim_types", version = "1.0.0" }

# Core dependencies
tokio = { version = "1.0", features = ["full", "signal"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }

# Scheduling
cron = "0.13"

# Config parsing
toml = "0.9"

# Random jitter for cron scheduling
rand = "0.8"

# UUID generation for session IDs
uuid = { version = "1.0", features = ["v4"] }

# Pattern matching for issue-to-agent mapping
regex = "1"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"

[[bin]]
name = "adf"
path = "src/bin/adf.rs"
