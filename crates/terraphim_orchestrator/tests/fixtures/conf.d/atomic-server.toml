##    - Skill: disciplined-implementation
##    - Run: cargo check && cargo clippy -- -D warnings && cargo fmt --check
##    - Run: cd browser && npm run lint (if frontend touched)
## 4. COMMIT: git commit -m "[agent] feat: description. Refs terraphim/atomic-server#IDX"
## 5. PUSH + PR: Create PR, comment @adf:atomic-reviewer
'''

