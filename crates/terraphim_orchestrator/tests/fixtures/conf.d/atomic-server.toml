# ---------------------------------------------------------------
# Agent 3: atomic-build-runner
# V-Model Phase: Verification (build + test execution)
# Skills: devops, testing, deterministic-ci
# ---------------------------------------------------------------
[[agents]]
name = "atomic-build-runner"
layer = "Growth"
cli_tool = "/bin/bash"
max_cpu_seconds = 1800
capabilities = ["build", "test", "deterministic-ci"]
event_only = true
project = "atomic-server"
task = '''
source ~/.profile

# Defence-in-depth: build-runner must be spawned by handle_push with full
# ADF_PUSH_* env. The orchestrator's event_only gate prevents mention
# dispatch; this guard catches any future dispatch path that forgets.
if [ -z "${ADF_PUSH_SHA:-}" ]; then
  echo "build-runner: missing ADF_PUSH_SHA; cannot post commit status; exit" >&2
  exit 1
fi
if [ -z "${ADF_PUSH_REF:-}" ]; then
  echo "build-runner: ADF_PUSH_SHA=$ADF_PUSH_SHA but ADF_PUSH_REF missing" >&2
  curl -fsS -X POST \
    -H "Authorization: token $GITEA_TOKEN" \
    -H "Content-Type: application/json" \
    -d "{\"state\":\"error\",\"context\":\"adf/build\",\"description\":\"build-runner spawned without REF\"}" \
    "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/statuses/$ADF_PUSH_SHA" \
    >/dev/null 2>&1 || true
  exit 1
fi

cd "$GITEA_WORKING_DIR"
git fetch origin "$ADF_PUSH_REF"
git checkout "$ADF_PUSH_SHA"

POST_STATUS() {
  local STATE="$1"
  local DESC="$2"
  curl -fsS -X POST \
    -H "Authorization: token $GITEA_TOKEN" \
    -H "Content-Type: application/json" \
    -d "{\"state\":\"$STATE\",\"context\":\"adf/build\",\"description\":\"$DESC\"}" \
    "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/statuses/$ADF_PUSH_SHA" \
    >/dev/null 2>&1 || true
}

POST_STATUS pending "build started"

set -e
trap 'POST_STATUS failure "build failed"; exit 1' ERR

# Rust verification
cargo fmt --all -- --check
cargo clippy --workspace --all-targets -- -D warnings
cargo test --workspace --no-fail-fast

# Frontend verification (if browser/ changed)
if git diff --name-only HEAD~1 | grep -q "^browser/"; then
  cd browser && npm ci && npm run lint && npm run test
fi

POST_STATUS success "fmt+clippy+test pass"
'''

