# ---------------------------------------------------------------
# Agent 5: atomic-upstream-synchronizer
# V-Model Phase: Ongoing maintenance + security patch detection
# Skills: devops, git-safety-guard, security-audit
# Schedule: Daily at 01:45 UTC
# ---------------------------------------------------------------
[[agents]]
name = "atomic-upstream-synchronizer"
layer = "Core"
schedule = "45 1 * * *"
cli_tool = "/home/alex/.local/bin/claude"
model = "haiku"
fallback_model = "kimi-for-coding/k2p5"
fallback_provider = "/home/alex/.bun/bin/opencode"
persona = "Conduit"
skill_chain = [
    "devops",
    "git-safety-guard",
    "security-audit",
]
max_cpu_seconds = 600
grace_period_secs = 30
capabilities = [
    "upstream-sync",
    "fork-management",
    "security-patch-detection",
]
project = "atomic-server"
task = '''
source ~/.profile

export GITEA_TOKEN=<token>
export GITEA_URL=https://git.terraphim.cloud

WORKING_DIR="/home/alex/projects/terraphim/atomic-server"
UPSTREAM_URL="https://github.com/ontola/atomic-server.git"

echo "=== Atomic Server Upstream Sync Check ==="
echo "Fork: $WORKING_DIR"
echo "Upstream: $UPSTREAM_URL"
echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

if [ ! -d "$WORKING_DIR/.git" ]; then
  echo "ERROR: atomic-server not found at $WORKING_DIR"
  exit 1
fi

cd "$WORKING_DIR"

if ! git remote | grep -q "^upstream$"; then
  git remote add upstream "$UPSTREAM_URL"
  echo "Added upstream remote"
fi

echo "Fetching upstream..."
git fetch upstream --depth=200 2>&1 | tail -5 || {
  echo "ERROR: git fetch upstream failed"
  exit 1
}

AHEAD=$(git log upstream/develop..develop --oneline 2>/dev/null | wc -l | tr -d ' ')
BEHIND=$(git log develop..upstream/develop --oneline 2>/dev/null | wc -l | tr -d ' ')

echo ""
echo "=== Divergence Summary ==="
echo "Fork is $AHEAD commits ahead of upstream/develop"
echo "Fork is $BEHIND commits behind upstream/develop"

echo ""
echo "Our custom commits (top 10):"
git log upstream/develop..develop --oneline 2>/dev/null | head -10

SECURITY_COMMITS=""
if [ "$BEHIND" -gt 0 ]; then
  echo ""
  echo "=== Upstream commits we are missing (top 20) ==="
  git log develop..upstream/develop --oneline 2>/dev/null | head -20

  SECURITY_COMMITS=$(git log develop..upstream/develop --oneline 2>/dev/null \
    | grep -iE "CVE|security|vuln|fix.*(sec|auth|xss|sqli|csrf|injection|bypass|escalat)" \
    | head -10)

  if [ -n "$SECURITY_COMMITS" ]; then
    echo ""
    echo "=== SECURITY-RELEVANT UPSTREAM COMMITS ==="
    echo "$SECURITY_COMMITS"
  fi
fi

if [ "$BEHIND" -gt 50 ] && [ -n "$SECURITY_COMMITS" ]; then
  EXISTING=$(gtr list-issues --owner terraphim --repo atomic-server --state open 2>/dev/null \
    | python3 -c 'import json,sys; issues=json.load(sys.stdin); [print(i["number"]) for i in issues if "Theme-ID: atomic-upstream-drift" in i.get("body","")]' \
    | head -1)

  if [ -n "$EXISTING" ]; then
    gtr comment --owner terraphim --repo atomic-server --index "$EXISTING" \
      --body "Upstream drift update $(date -u +%Y-%m-%dT%H:%M:%SZ): $BEHIND commits behind.

Security commits:
$SECURITY_COMMITS"
  else
    gtr create-issue --owner terraphim --repo atomic-server \
      --title "[Security] atomic-server $BEHIND commits behind upstream" \
      --body "## Problem

The terraphim atomic-server fork is $BEHIND commits behind ontola/atomic-server develop.

## Security-Relevant Commits Missing

$SECURITY_COMMITS

## Context

The fork is $AHEAD commits ahead (our custom changes). These must be preserved when cherry-picking.

## Recommended Action

Review each security commit and cherry-pick if applicable.

Theme-ID: atomic-upstream-drift"
  fi
elif [ "$BEHIND" -gt 0 ]; then
  echo "Fork is $BEHIND commits behind but no security commits found"
else
  echo "Fork is up to date with upstream"
fi

echo ""
echo "=== Sync check complete ==="
'''