# ============================================================
# Project: better-auth-rust
# Description: Comprehensive authentication library for Rust
# Languages: Rust (100%)
# Disciplined Engineering: Required for all features
# Status: Original project (not a fork)
# ============================================================

[[projects]]
id = "better-auth-rust"
name = "Better Auth Rust"
working_dir = "/home/alex/projects/terraphim/better-auth-rust"
gitea = { owner = "terraphim", repo = "better-auth-rust", base_url = "https://git.terraphim.cloud", token = "5d663368d955953ddf900ff33420fcabebfbfb4b" }

# ---------------------------------------------------------------
# Agent 1: better-auth-rust-developer
# Reuses: terraphim-developer pattern
# V-Model Phases: Research -> Design -> Implementation
# ---------------------------------------------------------------
[[agents]]
name = "better-auth-rust-developer"
layer = "Core"
cli_tool = "/home/alex/.bun/bin/opencode"
model = "sonnet"
fallback_model = "kimi-for-coding/k2p5"
persona = "ferrox"
terraphim_role = "Backend Developer"
skill_chain = [
    "disciplined-research",
    "disciplined-design",
    "disciplined-implementation",
    "testing",
]
capabilities = [
    "implementation",
    "rust",
    "tdd",
    "backend-architecture",
]
max_cpu_seconds = 7200
max_ticks = 24
grace_period_secs = 30
project = "better-auth-rust"
task = '''
source ~/.profile

export GITEA_TOKEN=<token>
export GITEA_URL=https://git.terraphim.cloud

cd "$GITEA_WORKING_DIR" && git pull --ff-only

## Pick highest-priority unblocked issue
READY=$(gtr ready --owner terraphim --repo better-auth-rust 2>/dev/null)
if [ -z "$READY" ] || [ "$READY" = "null" ]; then
  echo "No ready issues"
  exit 0
fi

## IMPLEMENTATION PROTOCOL (V-Model):
## 1. RESEARCH: Read issue, explore codebase
##    - Skill: disciplined-research
##    - Output: .docs/research-ISSUE.md
## 2. DESIGN: Architecture decision + file changes + test strategy
##    - Skill: disciplined-design
##    - Output: .docs/design-ISSUE.md
## 3. IMPLEMENT: Code following design doc
##    - Skill: disciplined-implementation
##    - Run: cargo fmt --all && cargo clippy --workspace --all-targets -- -D warnings
##    - Run: cargo test --workspace --no-fail-fast
## 4. COMMIT: git commit -m "[agent] feat: description. Refs terraphim/better-auth-rust#IDX"
## 5. PUSH + PR: Create PR, comment @adf:better-auth-rust-reviewer
'''

# ---------------------------------------------------------------
# Agent 2: better-auth-rust-reviewer
# Reuses: terraphim-reviewer pattern
# V-Model Phase: PR Review Gate
# ---------------------------------------------------------------
[[agents]]
name = "better-auth-rust-reviewer"
layer = "Core"
cli_tool = "/home/alex/.bun/bin/opencode"
model = "haiku"
persona = "echo"
terraphim_role = "Code Reviewer"
skill_chain = [
    "structural-pr-review",
    "code-review",
]
capabilities = ["review", "rust", "security-audit"]
max_cpu_seconds = 1800
project = "better-auth-rust"
task = '''
# PR Review Agent for better-auth-rust
# Applies structural-pr-review skill chain
# Checks: Rust idioms, error handling, test coverage, auth security patterns
# Verdict: GO / NO-GO with specific findings
# Comments posted via gtr on PR
'''

# ---------------------------------------------------------------
# Agent 3: better-auth-rust-build-runner
# Reuses: terraphim-build-runner pattern
# V-Model Phase: Verification (build + test)
# ---------------------------------------------------------------
[[agents]]
name = "better-auth-rust-build-runner"
layer = "Growth"
cli_tool = "/bin/bash"
max_cpu_seconds = 1800
capabilities = ["build", "test", "deterministic-ci"]
event_only = true
project = "better-auth-rust"
task = '''
source ~/.profile

# Defence-in-depth: build-runner must be spawned by handle_push with full
# ADF_PUSH_* env. The orchestrator's event_only gate prevents mention
# dispatch; this guard catches any future dispatch path that forgets.
if [ -z "${ADF_PUSH_SHA:-}" ]; then
  echo "build-runner: missing ADF_PUSH_SHA; cannot post commit status; exit" >&2
  exit 1
fi
if [ -z "${ADF_PUSH_REF:-}" ]; then
  echo "build-runner: ADF_PUSH_SHA=$ADF_PUSH_SHA but ADF_PUSH_REF missing" >&2
  curl -fsS -X POST \
    -H "Authorization: token $GITEA_TOKEN" \
    -H "Content-Type: application/json" \
    -d "{\"state\":\"error\",\"context\":\"adf/build\",\"description\":\"build-runner spawned without REF\"}" \
    "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/statuses/$ADF_PUSH_SHA" \
    >/dev/null 2>&1 || true
  exit 1
fi

cd "$GITEA_WORKING_DIR"
git fetch origin "$ADF_PUSH_REF"
git checkout "$ADF_PUSH_SHA"

POST_STATUS() {
  local STATE="$1"
  local DESC="$2"
  curl -fsS -X POST \
    -H "Authorization: token $GITEA_TOKEN" \
    -H "Content-Type: application/json" \
    -d "{\"state\":\"$STATE\",\"context\":\"adf/build\",\"description\":\"$DESC\"}" \
    "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/statuses/$ADF_PUSH_SHA" \
    >/dev/null 2>&1 || true
}

POST_STATUS pending "build started"

set -e
trap 'POST_STATUS failure "build failed"; exit 1' ERR

# Sentrux quality check - establish baseline before build
if command -v sentrux >/dev/null 2>&1; then
  SENTRUX_OUTPUT=$(sentrux check . 2>&1 || true)
  QUALITY=$(echo "$SENTRUX_OUTPUT" | grep "Quality:" | awk '{print $2}')
  if [ -n "$QUALITY" ]; then
    echo "Sentrux quality signal: $QUALITY"
    POST_STATUS pending "quality: $QUALITY"
  fi
fi

# Rust verification
cargo fmt --all -- --check
cargo clippy --workspace --all-targets -- -D warnings
cargo test --workspace --no-fail-fast

# Build check
cargo build --workspace

# Sentrux quality check after build - save baseline
if command -v sentrux >/dev/null 2>&1; then
  SENTRUX_OUTPUT=$(sentrux check . 2>&1 || true)
  QUALITY=$(echo "$SENTRUX_OUTPUT" | grep "Quality:" | awk '{print $2}')
  if [ -n "$QUALITY" ]; then
    echo "Sentrux quality signal after build: $QUALITY"
    curl -fsS -X POST \
      -H "Authorization: token $GITEA_TOKEN" \
      -H "Content-Type: application/json" \
      -d "{\"title\":\"sentrux-baseline\",\"content\":\"$QUALITY\",\"message\":\"Update baseline: $QUALITY\"}" \
      "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/wiki/new" 2>/dev/null || \
    curl -fsS -X POST \
      -H "Authorization: token $GITEA_TOKEN" \
      -H "Content-Type: application/json" \
      -d "{\"content\":\"$QUALITY\",\"message\":\"Update baseline: $QUALITY\"}" \
      "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/wiki/sentrux-baseline" 2>/dev/null || true
  fi
fi

POST_STATUS success "fmt+clippy+test+build pass | quality: ${QUALITY:-N/A}"
'''
