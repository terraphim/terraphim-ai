[package]
name = "atomic-wasm-demo"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
atomic-server-client = { path = "..", default-features = false, features = ["wasm"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }

serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
wasm-logger = "0.2"
log = { workspace = true }

once_cell = "1"
js-sys = "0.3"
