[package]
name = "terraphim_usage"
version.workspace = true
edition.workspace = true
description = "Usage tracking and analytics for Terraphim AI"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "usage", "tracking", "analytics", "metrics"]
license = "Apache-2.0 OR MIT"
readme = "../../README.md"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
jiff = "0.2"
thiserror = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true, optional = true }
tokio = { workspace = true }
clap = { version = "4.5", features = ["derive"], optional = true }
colored = { version = "2.1", optional = true }
indicatif = { version = "0.17", optional = true }
tracing = { workspace = true }

async-trait = { workspace = true }
toml = "0.8"

which = "6.0"
terraphim_persistence = { version = "1.20.2",  optional = true, registry = "terraphim" }
terraphim_types = { version = "1.20.2", registry = "terraphim" }
terraphim_settings = { version = "1.20.2", registry = "terraphim" }
terraphim_ccusage = { path = "../terraphim_ccusage", version = "1.20.3", optional = true, registry = "terraphim" }
opendal = { version = "0.54", optional = true }

[features]
default = ["persistence", "providers"]
persistence = ["dep:terraphim_persistence", "dep:opendal"]
cli = ["dep:clap", "dep:colored", "dep:indicatif"]
providers = ["dep:reqwest", "dep:terraphim_ccusage"]
