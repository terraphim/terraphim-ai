[package]
name = "terraphim_config"
version = "1.20.2"
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "Terraphim configuration"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["personal-assistant", "ai", "privacy", "configuration", "config"]
license = "Apache-2.0"
readme = "../../README.md"


[[bin]]
bench = false
path = "src/bin/main.rs"
name = "terraphim-config"

[dependencies]
terraphim_rolegraph = { version = "1.0.0", registry = "terraphim" }
terraphim_types = { version = "1.0.0", registry = "terraphim" }
terraphim_automata = { version = "1.19.2", registry = "terraphim", features = ["remote-loading"] }
terraphim_persistence = { path = "../terraphim_persistence", version = "1.0.0", registry = "terraphim" }
terraphim_settings = { path = "../terraphim_settings", version = "1.0.0", registry = "terraphim" }

opendal = { version = "0.54", features = [
    "services-dashmap",
] }
tokio = { version = "1.35.1", features = [
    "full",
    "fs",
    "macros",
    "rt-multi-thread",
] }
log = { workspace = true }

tracing = { workspace = true }

tracing-subscriber = { version = "0.3", features = [
    "env-filter",
    "tracing-log",
] }
serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }

toml = "0.8"
async-trait = { workspace = true }

ahash = { version = "0.8.8", features = ["serde"] }
dirs = "6.0"
regex = "1"
anyhow = { workspace = true }

url = { version = "2.5.8", features = ["serde"] }
async-once-cell = "0.5.3"
ulid = { version = "1.0.0", features = ["serde", "uuid"] }
thiserror = { workspace = true }

schemars = { version = "0.8.22", features = ["derive"] }
tsify = { version = "0.5", features = ["js"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }

[features]
default = []
typescript = ["tsify", "wasm-bindgen"]
openrouter = []

[dev-dependencies]
tempfile = { workspace = true }

env_logger = "0.11"
terraphim_test_utils = { version = "1.20.3", registry = "terraphim" }
