[package]
name = "terraphim_file_search"
version.workspace = true
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "Knowledge-graph scored file search integration for Terraphim AI"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["file-search", "knowledge-graph", "scoring", "automata"]
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
terraphim_automata = { path = "../terraphim_automata" }
terraphim_types = { path = "../terraphim_types" }
fff-search = { git = "https://github.com/AlexMikhalev/fff.nvim.git", branch = "feat/external-scorer" }

ahash = "0.8"
parking_lot = "0.12"
tracing = "0.1"
notify = "8"
notify-debouncer-full = "0.6"

[features]
default = []
zlob = ["fff-search/zlob"]

[dev-dependencies]
tokio = { workspace = true }
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "kg_scoring"
harness = false
