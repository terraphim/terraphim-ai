[package]
name = "terraphim_mcp_server"
version = "1.0.0"
edition.workspace = true
description = "Model Context Protocol (MCP) server for Terraphim AI"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "mcp", "server", "model-context-protocol"]
license = "MIT"
publish = ["terraphim"]  # E5 #1910: clients repo publishes to terraphim registry
readme = "../../README.md"

[[bin]]
name = "terraphim_mcp_server"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }

base64 = "0.21"
clap = { version = "4.5", features = ["derive"] }
rmcp = { version = "0.9.0", features = ["server", "transport-sse-server", "transport-io"] }
serde_json = { workspace = true }

fff-search = { version = "0.8.4" }
terraphim_automata = { version = "1.20.2", registry = "terraphim", features = ["tokio-runtime"] }
terraphim_config = { version = "1.20.2", registry = "terraphim" }
terraphim_file_search = { version = "1.20.3", registry = "terraphim" }
terraphim_hooks = { version = "1.20.2", path = "../terraphim_hooks", registry = "terraphim" }
terraphim_rolegraph = { version = "1.20.2", registry = "terraphim" }
terraphim_service = { version = "1.20.2", registry = "terraphim" }
terraphim_types = { version = "1.20.2", registry = "terraphim" }
thiserror = { workspace = true }

tokio = { workspace = true, features = ["full"] }

tracing = { workspace = true }

tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio-util = { version = "0.7" }
axum = { version = "0.8" }

[features]
# zlob: disabled by default to avoid Zig compiler dependency in CI/CD
default = []
openrouter = ["terraphim_config/openrouter"]
zlob = ["fff-search/zlob", "terraphim_file_search/zlob"]
jmap = ["terraphim_middleware/jmap"]

[dev-dependencies]
ahash = "0.8"
anyhow = { workspace = true }

regex = "1"
rmcp = { version = "0.9.0", features = ["client", "server", "transport-child-process", "transport-sse-server"] }
serde_json = { workspace = true }

serial_test = "3.3"
tempfile = { workspace = true }

terraphim_automata = { version = "1.20.2", registry = "terraphim" }  # For AutomataPath
terraphim_config = { version = "1.20.2", registry = "terraphim" }
terraphim_middleware = { version = "1.20.3", registry = "terraphim" }  # For Logseq builder
terraphim_persistence = { version = "1.20.2",  features = ["memory"], registry = "terraphim" }
terraphim_file_search = { version = "1.20.3", registry = "terraphim" }
terraphim_test_utils = { version = "1.20.3", registry = "terraphim" }
env_logger = "0.11"
