[package]
name = "terraphim_onepassword_cli"
version = "1.0.0"
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "1Password CLI integration for Terraphim AI secret management"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["1password", "secrets", "cli", "security", "configuration"]
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }

thiserror = { workspace = true }

log = { workspace = true }

regex = "1.12.3"
tokio = { workspace = true, features = ["process", "rt", "macros", "time"] }

async-trait = { workspace = true }


[dev-dependencies]
tempfile = { workspace = true }

test-log = "0.2.19"
tokio-test = "0.4"

[features]
default = []
