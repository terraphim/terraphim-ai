[[bin]]
name = "eval-check"
path = "src/main.rs"

[lib]
name = "terraphim_eval_check"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
clap = { version = "4", features = ["derive"] }
