[package]
name = "terraphim_rolegraph_py"
version = "1.0.0"
edition = "2024"
authors = ["Terraphim Contributors"]
description = "Python bindings for terraphim_rolegraph - Knowledge graph operations for AI agents"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["python", "bindings", "knowledge-graph", "rolegraph", "ai-agents"]
license = "Apache-2.0"
readme = "README.md"

[lib]
name = "terraphim_rolegraph"
crate-type = ["cdylib"]

[dependencies]
terraphim_rolegraph = { path = "../terraphim_rolegraph", version = "1.0.0" }
terraphim_types = { path = "../terraphim_types", version = "1.0.0", default-features = false }
terraphim_automata = { path = "../terraphim_automata", version = "1.0.0", default-features = false }

pyo3 = { version = "0.23", features = ["extension-module", "abi3-py39"] }
serde_json = "1"
log = "0.4"

[dev-dependencies]
pyo3 = { version = "0.23", features = ["auto-initialize"] }

[features]
default = []
