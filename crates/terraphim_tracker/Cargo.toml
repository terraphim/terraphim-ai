[package]
name = "terraphim_tracker"
version = "0.1.0"
edition = "2024"
authors = ["Terraphim Team"]
description = "Issue tracker integration for Terraphim - provides unified interface for Gitea and other trackers"
license = "Apache-2.0"
repository = "https://github.com/terraphim/terraphim-ai"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
thiserror = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"
