[package]
name = "terraphim_workspace"
version.workspace = true
edition.workspace = true
authors = ["Terraphim Team <team@terraphim.ai>"]
description = "Workspace management for agent execution - lifecycle, hooks, and isolation"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "workspace", "agents", "lifecycle", "isolation"]
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
tokio = { workspace = true, features = ["process", "rt", "macros", "time"] }

serde = { workspace = true, features = ["derive"] }

thiserror = { workspace = true }

tracing = { workspace = true }

tempfile = { workspace = true }

jiff = "0.2"

[dev-dependencies]
tokio-test = "0.4"
