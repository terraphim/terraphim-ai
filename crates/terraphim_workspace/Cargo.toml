[package]
name = "terraphim_workspace"
version = "1.13.0"
edition = "2024"
authors = ["Terraphim Team"]
description = "Workspace management for agent execution - lifecycle, hooks, and isolation"
license = "Apache-2.0"
repository = "https://github.com/terraphim/terraphim-ai"

[dependencies]
tokio = { version = "1.0", features = ["process", "rt", "macros", "time"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tracing = "0.1"
tempfile = "3.27"
jiff = "0.2"

[dev-dependencies]
tokio-test = "0.4"
