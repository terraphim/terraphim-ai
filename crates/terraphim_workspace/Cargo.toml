[package]
name = "terraphim_workspace"
version = "0.1.0"
edition = "2024"
authors = ["Terraphim Team"]
description = "Workspace management for Terraphim - handles workspace lifecycle and git operations"
license = "Apache-2.0"
repository = "https://github.com/terraphim/terraphim-ai"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
uuid = { version = "1.21", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
futures = "0.3"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"
