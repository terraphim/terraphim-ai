[package]
name = "terraphim_kg_linter"
version = "0.1.0"
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "Linter for markdown-based Terraphim KG schemas (commands, types, permissions)"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
terraphim_automata = { path = "../terraphim_automata", version = "1.0.0", features = ["tokio-runtime"] }
terraphim_types = { path = "../terraphim_types", version = "1.0.0" }
aho-corasick = "1.1"
walkdir = "2.5"
regex = "1.12"
serde = { workspace = true, features = ["derive"] }

serde_yaml = "0.9"
serde_json = { workspace = true }

thiserror = { workspace = true }

clap = { version = "4.5", features = ["derive"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

log = { workspace = true }

env_logger = "0.11"

[dev-dependencies]
tempfile = { workspace = true }
