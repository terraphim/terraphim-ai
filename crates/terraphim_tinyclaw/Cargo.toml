[package]
name = "terraphim_tinyclaw"
version.workspace = true
edition.workspace = true
description = "Multi-channel AI assistant for Terraphim - Telegram, Discord, and CLI"
license = "MIT OR Apache-2.0"
authors = ["Terraphim AI"]

[[bin]]
name = "terraphim-tinyclaw"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
toml = "0.8"

# HTTP client
reqwest = { workspace = true }
reqwest-eventsource = "0.6"

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Async traits
async-trait = { workspace = true }

# Time
chrono = { workspace = true }
uuid = { workspace = true }

# Logging
tracing = { workspace = true }

log = { workspace = true }
env_logger = "0.11"

# Environment
env_home = "0.1"
dirs = "5"

# Regex for ExecutionGuard
regex = "1"

# Concurrency
parking_lot = "0.12"

# CLI
clap = { version = "4", features = ["derive"] }

# Channel adapters (feature-gated)
teloxide = { version = "0.17", optional = true, features = ["macros"] }
# serenity removed: RUSTSEC-2026-0049 - rustls-webpki CRL bypass via serenity 0.12 -> rustls 0.22.
# Discord feature is stubbed pending serenity 0.13+ with rustls 0.23 support.
# See: https://git.terraphim.cloud/terraphim/terraphim-ai/issues/363
slack-morphism = { version = "2", optional = true, features = ["hyper"] }
# Note: matrix-sdk disabled due to sqlite dependency conflict with terraphim_persistence
# Re-enable when matrix-sdk updates to rusqlite 0.32+ or when conflict resolved
# matrix-sdk = { version = "0.7", optional = true, default-features = false, features = ["native-tls"] }

# Voice transcription (optional)
whisper-rs = { version = "0.16", optional = true }
symphonia = { version = "0.5", optional = true, features = ["ogg", "pcm", "mp3", "wav"] }
hound = { version = "3.5", optional = true }

[features]
default = ["telegram"]
telegram = ["dep:teloxide"]
# discord feature is a stub: serenity removed to fix RUSTSEC-2026-0049
discord = []
slack = ["dep:slack-morphism"]
voice = ["dep:whisper-rs", "dep:symphonia", "dep:hound"]
# matrix = ["dep:matrix-sdk"]

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }

criterion = { version = "0.8", features = ["async_tokio"] }

[[bench]]
name = "tinyclaw_benchmarks"
harness = false
