[package]
name = "terraphim_types"
version = "1.15.0"
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "Core types crate for Terraphim AI"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["personal-assistant", "ai", "privacy", "agent", "types"]
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
ahash = { version = "0.8.8", features = ["serde"] }
anyhow = { workspace = true }

chrono = { workspace = true, features = ["serde"] }

log = { workspace = true }

serde = { workspace = true, features = ["derive"] }

toml = "0.8"
serde_json = { workspace = true }

thiserror = { workspace = true }

strsim = "0.11.1"
schemars = { version = "0.8.22", features = ["derive"] }
tsify = { version = "0.5", features = ["js"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
ulid = { version = "1.0.0", features = ["serde", "uuid"] }

# Default uuid for native targets
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
uuid = { version = "1.21.0", features = ["v4", "serde"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

# WASM-specific dependencies (uuid with js feature, getrandom with wasm_js)
[target.'cfg(target_arch = "wasm32")'.dependencies]
uuid = { version = "1.19.0", features = ["v4", "serde", "js"] }
getrandom = { version = "0.3", features = ["wasm_js"] }

[features]
default = ["ontology"]
ontology = []       # Core generic ontology (string-based types)
medical = ["ontology"]  # Medical/oncology extensions
hgnc = ["medical"] # HGNC gene normalization
kg-integration = []  # Knowledge graph integration with learning capture
typescript = ["tsify", "wasm-bindgen"]
