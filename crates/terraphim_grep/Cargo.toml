[package]
name = "terraphim_grep"
version.workspace = true
edition.workspace = true
authors = ["Terraphim AI Team"]
description = "Intelligent hybrid grep with RLM fallback and KG curation"
license = "MIT"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["grep", "search", "knowledge-graph", "rlm"]
categories = ["development-tools"]

[dependencies]
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
anyhow.workspace = true
log.workspace = true

terraphim_types = { path = "../terraphim_types" }
terraphim_rolegraph = { path = "../terraphim_rolegraph" }
terraphim_automata = { path = "../terraphim_automata" }
terraphim_service = { path = "../terraphim_service", optional = true }
terraphim_config = { path = "../terraphim_config", optional = true }
haystack_core = { path = "../haystack_core", optional = true }
terraphim_file_search = { path = "../terraphim_file_search", optional = true }

fff-search = { git = "https://github.com/AlexMikhalev/fff.nvim.git", branch = "feat/external-scorer", optional = true }

async-trait.workspace = true
parking_lot = "0.12"
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

clap = { version = "4", features = ["derive"] }

[features]
default = ["llm"]
llm = ["dep:terraphim_service", "dep:terraphim_config"]
code-search = ["dep:terraphim_file_search", "dep:fff-search"]
doc-search = ["dep:haystack_core"]
# Enable OpenRouter provider support (required for live OpenRouter tests against free models)
openrouter = ["llm", "terraphim_service/openrouter"]

[dev-dependencies]
tokio-test = "0.4"
tempfile.workspace = true
criterion = { version = "0.8", features = ["async_tokio"] }
terraphim_router = { path = "../terraphim_router" }

[[bin]]
name = "terraphim-grep"
path = "src/main.rs"

[[bench]]
name = "hybrid_search"
harness = false
required-features = ["code-search"]
