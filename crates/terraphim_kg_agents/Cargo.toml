[package]
name = "terraphim_kg_agents"
version = "1.0.0"
edition.workspace = true
description = "Specialized knowledge graph-based agent implementations"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "agents", "knowledge-graph", "specialized"]
license = "MIT OR Apache-2.0"
readme = "../../README.md"

[dependencies]
# Core dependencies
async-trait = { workspace = true }

log = { workspace = true }

fastrand = "2"
serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }

thiserror = { workspace = true }

tokio = { workspace = true, features = ["full"] }

uuid = { workspace = true, features = ["v4"] }


# Terraphim dependencies
terraphim_agent_registry = { path = "../terraphim_agent_registry" }
terraphim_agent_supervisor = { path = "../terraphim_agent_supervisor" }
terraphim_automata = { version = "1.20.2", registry = "terraphim" }
terraphim_rolegraph = { version = "1.20.2", registry = "terraphim" }
terraphim_task_decomposition = { path = "../terraphim_task_decomposition" }
terraphim_types = { version = "1.20.2", registry = "terraphim" }

[dev-dependencies]
tokio-test = "0.4"
