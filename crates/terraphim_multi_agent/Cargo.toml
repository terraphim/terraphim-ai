[package]
name = "terraphim_multi_agent"
version = "1.0.0"
edition = "2021"
description = "Multi-agent system for Terraphim built on roles with rust-genai integration"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "multi-agent", "roles", "genai"]
license = "MIT"
publish = false
readme = "../../README.md"

[features]
default = ["test-utils"]
test-utils = []
hgnc = ["terraphim_types/hgnc"]

[dependencies]
# Workspace dependencies
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
log = { workspace = true }

# Direct HTTP client approach (like Goose) for LLM communication
reqwest = { workspace = true, features = ["json", "stream", "rustls-tls"] }


# Multi-provider generative AI client (using terraphim fork with OpenRouter support)
genai = { git = "https://github.com/terraphim/rust-genai.git", branch = "merge-upstream-20251103" }

# Additional dependencies
ahash = { version = "0.8.8", features = ["serde"] }
futures = "0.3"
fastrand = "2"
# tiktoken-rs = "0.6" # Now handled by rust-genai
tracing = { workspace = true }

regex = "1.12"

# Terraphim dependencies
terraphim_types = { version = "1.20.2", registry = "terraphim" }
terraphim_config = { version = "1.20.2",  features = ["openrouter"], registry = "terraphim" }
terraphim_rolegraph = { version = "1.20.2", registry = "terraphim" }
terraphim_automata = { version = "1.20.2", registry = "terraphim" }
terraphim_persistence = { version = "1.20.2", registry = "terraphim" }
terraphim_agent_evolution = {  path = "../terraphim_agent_evolution", registry = "terraphim" }
terraphim_service = { version = "1.20.2", registry = "terraphim" }
terraphim_agent_registry = { path = "../terraphim_agent_registry" }
terraphim_usage = { version = "1.20.3", registry = "terraphim" }

# Firecracker VM dependencies (optional, feature-gated)
# Note: fcctl-repl has its own workspace dependencies that may conflict
# For now, we'll keep the integration minimal with optional features

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }

criterion = { version = "0.8", features = ["html_reports"] }
# Enable test-utils for examples and benchmarks
terraphim_multi_agent = {  path = ".", features = ["test-utils"], registry = "terraphim" }

[[bench]]
name = "agent_operations"
harness = false
