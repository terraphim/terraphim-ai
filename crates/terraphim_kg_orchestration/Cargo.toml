[package]
name = "terraphim_kg_orchestration"
version = "1.0.0"
edition.workspace = true
authors = ["Terraphim Contributors"]
description = "Knowledge graph-based agent orchestration engine for coordinating multi-agent workflows"
documentation = "https://terraphim.ai"
homepage = "https://terraphim.ai"
repository = "https://github.com/terraphim/terraphim-ai"
keywords = ["ai", "agents", "orchestration", "knowledge-graph", "workflow"]
license = "Apache-2.0"
readme = "../../README.md"

[dependencies]
# Core Terraphim dependencies
terraphim_types = { path = "../terraphim_types", version = "1.0.0" }
terraphim_automata = { path = "../terraphim_automata", version = "1.0.0" }
terraphim_rolegraph = { path = "../terraphim_rolegraph", version = "1.0.0" }
terraphim_task_decomposition = { path = "../terraphim_task_decomposition", version = "1.0.0" }
terraphim_agent_supervisor = { path = "../terraphim_agent_supervisor", version = "1.0.0" }

# Core async runtime and utilities
tokio = { workspace = true }
async-trait = { workspace = true }

futures-util = "0.3"

# Error handling and serialization
thiserror = { workspace = true }

serde = { workspace = true, features = ["derive"] }

serde_json = { workspace = true }


# Unique identifiers and time handling
uuid = { workspace = true, features = ["v4", "serde"] }

chrono = { workspace = true, features = ["serde"] }


# Logging
log = { workspace = true }


# Collections and utilities
ahash = { version = "0.8.8", features = ["serde"] }
indexmap = { version = "2.0", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }

env_logger = "0.11"
serial_test = "3.3"

[features]
default = []
