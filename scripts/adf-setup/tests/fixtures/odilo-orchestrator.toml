# Synthetic odilo project fixture (no real tokens or private data)
working_dir = "/home/alex/projects/odilo"
restart_cooldown_secs = 300
max_restart_count = 3
disk_usage_threshold = 90
tick_interval_secs = 60
persona_data_dir = "/home/alex/terraphim-ai/data/personas"

[quickwit]
enabled = true
endpoint = "http://127.0.0.1:7280"
index_id = "adf-odilo-logs"
batch_size = 100
flush_interval_secs = 5

[gitea]
base_url = "https://git.example.test"
token = "fixture-token-not-real"
owner = "example-org"
repo = "odilo"

[nightwatch]
eval_interval_secs = 600
active_start_hour = 1
active_end_hour = 9
minor_threshold = 0.10
moderate_threshold = 0.20
severe_threshold = 0.40
critical_threshold = 0.70

[compound_review]
schedule = "0 3 * * *"
max_duration_secs = 900
repo_path = "/home/alex/projects/odilo"
create_prs = false
worktree_root = "/home/alex/projects/odilo/.worktrees"

[[agents]]
name = "odilo-developer"
layer = "Core"
cli_tool = "/home/alex/.local/bin/claude"
model = "sonnet"
persona = "Lux"
terraphim_role = "Rust Engineer"
skill_chain = ["disciplined-research", "disciplined-implementation"]
schedule = "0 1-9 * * *"
max_cpu_seconds = 1800
grace_period_secs = 30
task = "Pick the highest PageRank unblocked issue and implement it."

[[agents]]
name = "odilo-reviewer"
layer = "Core"
cli_tool = "/home/alex/.local/bin/claude"
model = "sonnet"
fallback_model = "kimi-for-coding/k2p5"
persona = "Lux"
skill_chain = ["disciplined-verification"]
schedule = "0 2-10 * * *"
max_cpu_seconds = 900
grace_period_secs = 30
task = "Review open PRs and post verdict."
