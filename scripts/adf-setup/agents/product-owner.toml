# product-owner agent template (Themis)
#
# Product Strategist: maintains the development roadmap using three layers
# of discipline drawn from the terraphim skills system:
#
#   1. Essentialism (5/25 Rule): cut the backlog to the vital few FIRST,
#      before any scoring -- the other 20 become "Avoid At All Cost".
#
#   2. Compound-RICE scoring on the survivors:
#      (Reach × Impact × Confidence × Synergy) / (Effort × Maintenance)
#      Synergy > 2.0 = compound opportunity = 4DX lead measure.
#      Priority bands: critical ≥30, high ≥15, medium ≥7, low <7.
#
#   3. Flawless Execution (4DX / WIG alignment): every created issue must
#      serve a current WIG and include a mini-UAT acceptance block with
#      3-5 testable Gherkin conditions. If it can't be shown, it doesn't count.
#
# A feature is not done until it has been marketed.
# Every issue created includes a one-line marketing hint.
#
# Persona: Themis -- decisive arbiter, evidence-weighing, trade-off explicit.
#   "Weigh, decide, ship. Name the trade-off. Name the WIG. Name the lead measure."
#
# Layer: Core (hourly at :55, midnight to 10am)
# Subscription-only models only (C1 constraint).

[[agents]]
name = "product-owner"
layer = "Core"
cli_tool = "/home/alex/.local/bin/claude"
model = "sonnet"
fallback_model = "kimi-for-coding/k2p5"
fallback_provider = "/home/alex/.bun/bin/opencode"
persona = "Themis"
skill_chain = [
    "disciplined-research",
    "disciplined-design",
    "disciplined-specification",
    "architecture",
    "business-scenario-design",
    "requirements-traceability",
    "acceptance-testing",
]
schedule = "55 0-10 * * *"
max_cpu_seconds = 7200
grace_period_secs = 30
capabilities = [
    "planning",
    "roadmap",
    "issue-creation",
    "prioritisation",
]
project = "terraphim"
task = '''
source ~/.profile
cd "$GITEA_WORKING_DIR" && git pull --ff-only

export GITEA_TOKEN=5d663368d955953ddf900ff33420fcabebfbfb4b
export GITEA_URL=https://git.terraphim.cloud

echo "=== Themis Product Owner Cycle: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

## Step 0: Read current WIGs from progress.md

WIGS=$(cat /home/alex/terraphim-ai/progress.md 2>/dev/null \
  | grep -A 20 "WIG\|Wildly Important\|Q2 2026\|Current Quarter" \
  | head -25 || echo "(progress.md not found -- WIG check skipped)")
echo "--- Current WIGs ---"
echo "$WIGS"

## Step 1: Essentialism -- 5/25 Rule to cut the backlog

ALL_ISSUES=$(gtr list-issues --owner "$GITEA_OWNER" --repo "$GITEA_REPO" --state open 2>/dev/null)
READY=$(gtr ready --owner "$GITEA_OWNER" --repo "$GITEA_REPO" 2>/dev/null)

ALL_TITLES=$(echo "$ALL_ISSUES" | python3 -c '
import json,sys
issues=json.load(sys.stdin)
for i in issues[:25]:
    print(f"#{i[\"number\"]} {i[\"title\"][:80]}")
' 2>/dev/null)

FILTER_PROMPT="You are Themis, product strategist. Apply the 5/25 Rule (Warren Buffett / Essentialism):

From the list below, identify:
1. TOP 5: the vital few that are essential to current WIGs and have highest leverage
2. AVOID AT ALL COST: the remaining 20 that are distractions, nice-to-haves, or premature

Current WIGs:
$WIGS

All open issues (up to 25):
$ALL_TITLES

Output format:
TOP 5 (vital few -- will be scored):
#NNN: <reason it is essential -- which WIG does it serve?>
...

AVOID AT ALL COST (dangerous distractions this cycle):
#NNN: <one-line reason why not now>
...

NOT DOING THIS CYCLE (essentialism constraint):
<One sentence naming what is explicitly sacrificed and why>"

FILTER_OUTPUT=$(/home/alex/.local/bin/claude -p --model sonnet --allowedTools "" --max-turns 3 "$FILTER_PROMPT" 2>&1)
echo ""
echo "=== Essentialism Filter (5/25 Rule) ==="
echo "$FILTER_OUTPUT"

# Extract the top 5 issue numbers for scoring
TOP5=$(echo "$FILTER_OUTPUT" | grep -oP '#\K\d+' | head -5)
echo ""
echo "Issues selected for Compound-RICE scoring: $TOP5"

## Step 2: Compound-RICE Scoring on the vital few

TOP5_DETAILS=$(echo "$ALL_ISSUES" | python3 -c "
import json,sys
issues=json.load(sys.stdin)
top5=[$(echo $TOP5 | tr ' ' ',')]
for i in issues:
    if i['number'] in top5:
        print(f\"#{i['number']} {i['title'][:80]}\")
        body=(i.get('body','') or '')[:200]
        if body:
            print(f\"  {body.replace(chr(10),' ')}\")
" 2>/dev/null)

RICE_PROMPT="You are Themis. Score these 5 issues using Compound-RICE:
Formula: (Reach × Impact × Confidence × Synergy) / (Effort × Maintenance)
Priority bands: critical ≥30, high ≥15, medium ≥7, low <7

Definitions:
- Reach: users/agents/workflows affected (1-100)
- Impact: improvement significance (1-10)
- Confidence: how certain are we this will work (0.1-1.0)
- Synergy: does this build on recent work or unlock future work?
  (1.0=neutral, 2.0+=compound opportunity = 4DX lead measure)
- Effort: relative implementation cost (1=trivial, 5=large, 10=huge)
- Maintenance: ongoing burden multiplier (1.0=neutral, 1.5=high)

Simplicity check: flag any issue where Effort ≥7 and ask if it can be decomposed.
Nothing Speculative check: flag any issue with 'in case we need it' language.

Issues to score:
$TOP5_DETAILS

Current WIGs (for Synergy context):
$WIGS

Output:
SCORES:
#NNN: reach=X impact=X confidence=X synergy=X effort=X maintenance=X
  compound_rice=Y  priority=<band>  [COMPOUND OPPORTUNITY if synergy>=2.0]
  WIG: <which WIG does this serve, or NONE>
  [SIMPLICITY FLAG: ...] if effort>=7
  [SPECULATIVE FLAG: ...] if vague scope

RANKED TOP 3:
1. #NNN (score=Y) -- <trade-off: doing this means not doing what?>
2. #NNN (score=Y) -- <trade-off>
3. #NNN (score=Y) -- <trade-off>

LEAD MEASURES (4DX):
- Completing #NNN unblocks: <downstream issues/WIGs>"

RICE_OUTPUT=$(/home/alex/.local/bin/claude -p --model sonnet --allowedTools "" --max-turns 3 "$RICE_PROMPT" 2>&1)
echo ""
echo "=== Compound-RICE Analysis ==="
echo "$RICE_OUTPUT"

## Step 3: Create new issues with WIG alignment + mini-UAT acceptance block

LEARNINGS=$(~/.cargo/bin/terraphim-agent learn query "roadmap prioritization issue creation" 2>/dev/null || echo "")

OPEN_COUNT=$(echo "$ALL_ISSUES" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))' 2>/dev/null || echo 0)

CREATION_PROMPT="You are Themis, product strategist for $GITEA_OWNER/$GITEA_REPO.

You have completed essentialism filtering and Compound-RICE scoring. Now identify up to 2 NEW issues to create.

Rules (from disciplined-design / acceptance-testing skills):
1. Not already tracked -- check the open issues list
2. Compound-RICE score would be ≥15 if scored
3. Well-scoped: completable in <500 LOC by one agent in <2 hours
4. Serves a current WIG
5. Nothing Speculative: no 'in case we need it later' scope
6. Must include testable acceptance criteria (mini-UAT block)

Context:
- Essentialism filter: $FILTER_OUTPUT
- RICE scores: $RICE_OUTPUT
- Open issue count: $OPEN_COUNT
- Prior learnings: $LEARNINGS
- Current WIGs: $WIGS

For each new issue provide this EXACT structure:

---NEW_ISSUE---
Title: [concise, imperative]
WIG: [which WIG this serves, or skip if none]
Compound-RICE estimate: reach=X impact=X confidence=X synergy=X effort=X maintenance=X -> score=Y
Problem: [2-3 sentences describing the problem]
Proposed solution: [bullet points, no hand-waving]
Acceptance criteria (mini-UAT):
  Given [precondition]
  When [action]
  Then [observable outcome]
  And [additional condition]
  And [additional condition]
Marketing hint: [one line -- how could this be announced or shared?]
Suggested agent: @adf:<role>
---END_ISSUE---

If no new issues meet the threshold, output: NO_NEW_ISSUES_NEEDED
Essentialism: explicitly name what is NOT on the roadmap this cycle."

CREATION_OUTPUT=$(/home/alex/.local/bin/claude -p --model sonnet --allowedTools "Bash,Read" --max-turns 5 "$CREATION_PROMPT" 2>&1)
echo ""
echo "=== New Issue Analysis ==="
echo "$CREATION_OUTPUT"

## Step 4: Parse and create the issues

if echo "$CREATION_OUTPUT" | grep -q "NO_NEW_ISSUES_NEEDED"; then
  echo "No new issues this cycle -- backlog is sufficient"
else
  # Extract and create each NEW_ISSUE block (max 2)
  echo "$CREATION_OUTPUT" | python3 << 'PYEOF'
import sys, re, subprocess, os

text = sys.stdin.read()
blocks = re.findall(r'---NEW_ISSUE---(.*?)---END_ISSUE---', text, re.DOTALL)

created = 0
for block in blocks[:2]:
    title_m = re.search(r'Title:\s*(.+)', block)
    if not title_m:
        continue
    title = title_m.group(1).strip()

    # Build body with all fields
    body_parts = []

    wig_m = re.search(r'WIG:\s*(.+)', block)
    if wig_m:
        body_parts.append(f"**WIG alignment**: {wig_m.group(1).strip()}")

    rice_m = re.search(r'Compound-RICE estimate:\s*(.+)', block)
    if rice_m:
        body_parts.append(f"**Compound-RICE**: {rice_m.group(1).strip()}")

    problem_m = re.search(r'Problem:\s*(.+?)(?=\nProposed|\nAcceptance|\nMarketing|\nSuggested|$)', block, re.DOTALL)
    if problem_m:
        body_parts.append(f"\n## Problem\n{problem_m.group(1).strip()}")

    solution_m = re.search(r'Proposed solution:\s*(.+?)(?=\nAcceptance|\nMarketing|\nSuggested|$)', block, re.DOTALL)
    if solution_m:
        body_parts.append(f"\n## Proposed Solution\n{solution_m.group(1).strip()}")

    ac_m = re.search(r'Acceptance criteria.*?:(.*?)(?=\nMarketing|\nSuggested|$)', block, re.DOTALL)
    if ac_m:
        body_parts.append(f"\n## Acceptance Criteria\n```gherkin{ac_m.group(1)}\n```")

    marketing_m = re.search(r'Marketing hint:\s*(.+)', block)
    if marketing_m:
        body_parts.append(f"\n**Marketing hint**: {marketing_m.group(1).strip()}")

    agent_m = re.search(r'Suggested agent:\s*(.+)', block)
    if agent_m:
        body_parts.append(f"\n**Suggested agent**: {agent_m.group(1).strip()}")

    body_parts.append("\n---\n*Created by @adf:product-owner (Themis) -- Compound-RICE + Essentialism + UAT cycle*")

    body = "\n".join(body_parts)

    result = subprocess.run(
        ['gtr', 'create-issue',
         '--owner', 'terraphim', '--repo', 'terraphim-ai',
         '--title', title, '--body', body],
        capture_output=True, text=True
    )
    if result.returncode == 0:
        print(f"Created: {title}")
        created += 1
    else:
        print(f"Failed to create '{title}': {result.stderr[:200]}")

print(f"Total created: {created}")
PYEOF
fi

## Step 5: Write roadmap report

REPORT_FILE="/opt/ai-dark-factory/reports/roadmap-$(date +%Y%m%d-%H%M).md"
cat > "$REPORT_FILE" << REPORTEOF
# Roadmap Report: $(date +%Y-%m-%d %H:%M UTC)

## Essentialism Filter (5/25 Rule)

$FILTER_OUTPUT

## Compound-RICE Scores

$RICE_OUTPUT

## Issue Creation

$CREATION_OUTPUT

## WIGs (from progress.md)

$WIGS
REPORTEOF
echo "Report: $REPORT_FILE"

## Step 6: Capture learning

~/.cargo/bin/terraphim-agent learn capture --type insight \
  --context "product-owner/$GITEA_REPO" \
  --description "Themis cycle: 5/25 filter + Compound-RICE + WIG alignment + UAT blocks" \
  2>/dev/null || true

echo ""
echo "=== Themis cycle complete ==="
'''
