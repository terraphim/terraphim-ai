# Project-meta coordinator agent template
#
# Dispatches the top PageRank-unblocked Gitea issue to the appropriate
# @adf:<role> agent after a scope-clarity quality gate (Step 0).
#
# Subscription-only models only (C1 constraint).

[[agents]]
name = "project-meta"
layer = "Core"
cli_tool = "/home/alex/.local/bin/claude"
model = "sonnet"
fallback_model = "kimi-for-coding/k2p5"
persona = "Conduit"
skill_chain = []
schedule = "*/30 * * * *"
max_cpu_seconds = 600
grace_period_secs = 30
task = '''
source ~/.profile
cd "$GITEA_WORKING_DIR"
git pull --ff-only

## Step 0: issue scope check (pre-dispatch quality gate)

READY=$(gtr ready --owner "$GITEA_OWNER" --repo "$GITEA_REPO" 2>/dev/null)
TOP_ISSUE=$(echo "$READY" | python3 -c 'import json, sys; d=json.load(sys.stdin); issues=d.get("ready_issues",[]); print(issues[0]["index"] if issues else "")')

if [ -z "$TOP_ISSUE" ]; then
  echo "No ready issues; exit"
  exit 0
fi

ISSUE_BODY=$(gtr view-issue --owner "$GITEA_OWNER" --repo "$GITEA_REPO" --issue "$TOP_ISSUE" 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body","") or "")')

SCOPE_PROMPT="Assess this Gitea issue for scope clarity. Return ONLY a JSON object with keys: clear (bool), reasons (array of strings), missing (array of strings). Criteria:
- Is scope bounded (clear deliverable, not a fishing expedition)?
- Are acceptance criteria present?
- Is the work reasonable for one agent (<500 LOC)?
- Does it reference existing primitives where relevant?

Issue body:
---
$ISSUE_BODY
---"

SCOPE_JSON=$(echo "$SCOPE_PROMPT" | /home/alex/.local/bin/claude -p --model haiku --allowedTools "" 2>&1)

CLEAR=$(echo "$SCOPE_JSON" | python3 -c 'import json,sys,re; t=sys.stdin.read(); m=re.search(r"\{.*\}",t,re.DOTALL); print(json.loads(m.group(0)).get("clear",False) if m else False)' 2>/dev/null || echo "false")

if [ "$CLEAR" = "False" ] || [ "$CLEAR" = "false" ]; then
  MISSING=$(echo "$SCOPE_JSON" | python3 -c 'import json,sys,re; t=sys.stdin.read(); m=re.search(r"\{.*\}",t,re.DOTALL); d=json.loads(m.group(0)) if m else {}; missing=d.get("missing",[]); reasons=d.get("reasons",[]); print("MISSING: "+"; ".join(missing)+"\nREASONS: "+"; ".join(reasons))' 2>/dev/null || echo "could not parse scope check output")

  # Idempotency guard: skip clarification re-post if one already exists in last 24h.
  # Prevents comment spam on every 30-min tick while the issue stays underspecified.
  EXISTING_CLARIFICATION=$(curl -sf -H "Authorization: token $GITEA_TOKEN" \
    "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/issues/$TOP_ISSUE/comments" 2>/dev/null \
    | python3 -c 'import json,sys,datetime; cs=json.load(sys.stdin); now=datetime.datetime.now(datetime.timezone.utc); recent=[c for c in cs if "Scope clarity check" in c.get("body","") and (now - datetime.datetime.fromisoformat(c["created_at"].replace("Z","+00:00"))).total_seconds() < 86400]; print("yes" if recent else "no")' 2>/dev/null || echo "no")

  if [ "$EXISTING_CLARIFICATION" = "yes" ]; then
    echo "Scope check FAIL; clarification already posted in last 24h; skip; exit"
    exit 0
  fi

  gtr comment --owner "$GITEA_OWNER" --repo "$GITEA_REPO" --issue "$TOP_ISSUE" --body "**Scope clarity check — needs more detail before dispatch**

$MISSING

Project-meta will not dispatch an agent until these are resolved. Add the missing fields and this issue will be picked up on the next cycle."
  echo "Scope check FAIL; clarification requested; exit"
  exit 0
fi

echo "Scope check PASS; proceeding to dispatch"

## Step 1: dispatch @adf:<role> mention to top issue

ISSUE_TITLE=$(gtr view-issue --owner "$GITEA_OWNER" --repo "$GITEA_REPO" --issue "$TOP_ISSUE" 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin).get("title","") or "")')

DISPATCH_PROMPT="Given this Gitea issue title and body, select the most appropriate ADF agent role from: developer, security, compliance, reviewer, product-development, repo-steward. Return ONLY the role name (one word).

Routing rules:
- developer: implementation, bugfix, feature coding (default)
- security: vulnerabilities, CVEs, security policy
- compliance: license, standards, regulatory
- reviewer: code review, PR review
- product-development: roadmap, feature tradeoffs, sequencing, scoping, prioritization
- repo-steward: repo health, docs confusion, recurring friction, onboarding pain, stability debt, usefulness debt

Title: $ISSUE_TITLE

Body:
---
$ISSUE_BODY
---"

ROLE=$(/home/alex/.local/bin/claude -p --model haiku --allowedTools "" "$DISPATCH_PROMPT" 2>/dev/null | tr -d '[:space:]' | head -c 20 || echo "developer")

# Sanitise: fall back to developer if role is not recognised
case "$ROLE" in
  developer|security|compliance|reviewer|product-development|repo-steward) ;;
  *) ROLE="developer" ;;
esac

gtr comment --owner "$GITEA_OWNER" --repo "$GITEA_REPO" --issue "$TOP_ISSUE" --body "@adf:$ROLE please pick up issue #$TOP_ISSUE"
echo "Dispatched @adf:$ROLE to issue #$TOP_ISSUE"
'''
