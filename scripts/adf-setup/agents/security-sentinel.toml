# Security-sentinel agent template
#
# Core-layer agent. Comprehensive security posture review:
# CVE scanning (cargo audit), secret detection, unsafe block review,
# UBS static analysis, port exposure. Owns all security scanning --
# the dedicated security-audit-flow agent has been removed.
# Runs 4 times per day (every 6 hours).
#
# Triggered by cron schedule OR human mention. Does NOT trigger
# merge-coordinator -- verdicts are consumed by the cron-driven
# merge-coordinator on its next evaluation cycle.
#
# Subscription-only models only (C1 constraint).

[[agents]]
name = "security-sentinel"
layer = "Core"
schedule = "0 */6 * * *"
cli_tool = "/home/alex/.bun/bin/opencode"
fallback_provider = "/home/alex/.bun/bin/opencode"
fallback_model = "kimi-for-coding/k2p5"
persona = "Vigil"
skill_chain = [
    "security-audit",
    "via-negativa-analysis",
    "disciplined-verification",
    "disciplined-validation",
]
max_cpu_seconds = 1200
max_ticks = 24
grace_period_secs = 30
capabilities = [
    "security",
    "vulnerability-scanning",
    "compliance",
    "static-analysis",
]
project = "terraphim"
task = '''
source ~/.profile

## Session Start -- Read Before Working

Before doing ANY work, check for learnings from previous agent runs:

1. Check terraphim-agent learnings for known security patterns:
   ~/.cargo/bin/terraphim-agent learn query "security vulnerability CVE unsafe"

2. Read any relevant wiki learnings:
   gtr wiki-list --owner terraphim --repo terraphim-ai | grep -i "Learning-security"

---

## Security Scan

cd /home/alex/terraphim-ai

### 1. CVE and dependency audit
cargo audit 2>&1 | tee /tmp/security-sentinel-cargo-audit.txt

### 2. Secret and credential scan
grep -rn \
  --include="*.rs" --include="*.toml" --include="*.json" --include="*.env" \
  -e "sk-" -e "api_key\s*=" -e "secret\s*=" -e "password\s*=" \
  crates/ scripts/ terraphim_server/ 2>/dev/null \
  | grep -v "test\|example\|\.lock\|_test\." \
  | tee /tmp/security-sentinel-secrets.txt

### 3. Unsafe block audit
grep -rn "unsafe" crates/ \
  | grep -v "test\|#\[allow\|//.*unsafe" \
  | tee /tmp/security-sentinel-unsafe.txt

### 4. UBS static analysis (if available)
if command -v ubs >/dev/null 2>&1 || [ -f "$HOME/.local/bin/ubs" ]; then
  UBS_CMD=$(command -v ubs 2>/dev/null || echo "$HOME/.local/bin/ubs")
  UBS_MAX_DIR_SIZE_MB=0 "$UBS_CMD" . 2>&1 | tail -60 | tee /tmp/security-sentinel-ubs.txt
else
  echo "UBS not installed -- skipping AST-based scan" | tee /tmp/security-sentinel-ubs.txt
fi

### 5. Port exposure
ss -tlnp 2>/dev/null | tee /tmp/security-sentinel-ports.txt

### 6. Recent security-relevant commits (last 24h)
git log --since="24 hours ago" --oneline -- "*.rs" "*.toml" | tee /tmp/security-sentinel-commits.txt

---

## Verdict

Analyse the scan outputs above. Apply via-negativa-analysis and security-audit skill guidance.

Classify findings:
- P0: exploitable remotely or exposes credentials
- P1: high severity CVE or unsafe block with unsafe assumption
- P2: medium CVE or UBS high-confidence finding
- P3: low severity / informational

## Post verdict to Gitea

If dispatched via @adf:security-sentinel mention:
gtr comment --owner terraphim --repo terraphim-ai --index ISSUE_NUMBER \
  --body "security-sentinel verdict: PASS/FAIL

<structured findings by priority>
"

If running on cron schedule and P0 or P1 findings exist:
EXISTING=$(gtr list-issues --owner terraphim --repo terraphim-ai --state open 2>/dev/null \
  | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(i["number"]) for i in d if "Theme-ID: security-finding" in i.get("body","")]' | head -1)
if [ -n "$EXISTING" ]; then
  gtr comment --owner terraphim --repo terraphim-ai --index "$EXISTING" \
    --body "Recurrence $(date -u +%Y-%m-%dT%H:%M:%SZ): <summary>"
else
  gtr create-issue --owner terraphim --repo terraphim-ai \
    --title "[Security] Findings $(date +%Y-%m-%d)" \
    --body "<findings>

Theme-ID: security-finding

@adf:meta-coordinator please action this finding."
fi

If cron run and no P0/P1 findings: exit 0 silently.

IMPORTANT: Do NOT mention @adf:merge-coordinator or any other agent in your verdict comment.

---

## Session Handover

gtr wiki-create --owner terraphim --repo terraphim-ai \
  --title "Learning-$(date +%Y%m%d)-security-sentinel" \
  --content "## Session Summary
**Agent**: security-sentinel
**Outcome**: PASS/FAIL
### Findings
- ...
### What to check next time
- ..." \
  --message "Session learning from security-sentinel"
'''
