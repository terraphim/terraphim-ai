# systemd drop-in for act-runner restart policy
# Install: mkdir -p /etc/systemd/system/act-runner.service.d/
#          cp runner-service-drop-in.conf /etc/systemd/system/act-runner.service.d/restart.conf
#          systemctl daemon-reload
#          systemctl restart act-runner

[Service]
Restart=on-failure
RestartSec=30
StartLimitBurst=3
StartLimitIntervalSec=120

# Memory limit to prevent OOM from consuming all system memory
MemoryMax=4G
MemoryHigh=3G

# OOM score adjustment - prefer killing runner over critical services
OOMScoreAdjust=100

# Watchdog - runner must stay responsive
WatchdogSec=300

# Resource limits
LimitNOFILE=65536
TasksMax=256
