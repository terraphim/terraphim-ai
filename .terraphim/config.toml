# Terraphim Grep Configuration
#
# Pipeline: fff-search -> KG boost -> sufficiency judge -> RLM fallback -> KG curation
#
# 1. fff-search finds code chunks matching the query
# 2. KG concepts from the thesaurus are matched against chunks (KG boost)
# 3. Sufficiency judge decides: Sufficient / NeedsSynthesis / NeedsExpansion / Insufficient
# 4. If insufficient, RLM fallback builds context (RlmContext) with chunks + KG concepts,
#    sends to LLM for synthesis, and returns an answer with citations
# 5. KgCurationRlm auto-extracts new concepts from the LLM answer and indexes them
#    back into the KG (feedback loop -- the KG grows with each RLM call)
#
# Each role has:
#   - A knowledge graph (KG) directory with markdown concept files
#   - A thesaurus JSON file for Aho-Corasick matching and KG boost
#   - Two haystacks: docs (markdown documentation) and code (source files)
#   - Optional LLM config for RLM synthesis and KG curation
#
# Usage (search-only, no LLM):
#   terraphim-grep --role devops --thesaurus .terraphim/thesaurus-devops.json \
#     --paths . "pipeline"
#
# Usage (with RLM synthesis + KG curation):
#   OPENROUTER_API_KEY=sk-or-... terraphim-grep --role devops \
#     --thesaurus .terraphim/thesaurus-devops.json --paths . --answer "pipeline"
#
# Usage (with role config JSON for LLM routing):
#   terraphim-grep --role devops --thesaurus .terraphim/thesaurus-devops.json \
#     --role-config .terraphim/role-devops.json --paths . --answer --force-rlm "pipeline"

[roles.devops]
name = "DevOps"
shortname = "devops"
thesaurus = ".terraphim/thesaurus-devops.json"
kg_path = ".terraphim/kg/devops"
search_paths = ["."]
llm_provider = "openrouter"
llm_model = "qwen/qwen3-coder:free"
kg_curation_enabled = true

[roles.devops.haystacks]
docs = ".terraphim/haystacks/docs"
code = "."

[roles.rust-engineer]
name = "Rust Engineer"
shortname = "rust-engineer"
thesaurus = ".terraphim/thesaurus-rust-engineer.json"
kg_path = ".terraphim/kg/rust-engineer"
search_paths = ["."]
llm_provider = "openrouter"
llm_model = "qwen/qwen3-coder:free"
kg_curation_enabled = true

[roles.rust-engineer.haystacks]
docs = ".terraphim/haystacks/docs"
code = "."

[roles.ai-engineer]
name = "AI Engineer"
shortname = "ai-engineer"
thesaurus = ".terraphim/thesaurus-ai-engineer.json"
kg_path = ".terraphim/kg/ai-engineer"
search_paths = ["."]
llm_provider = "openrouter"
llm_model = "qwen/qwen3-coder:free"
kg_curation_enabled = true

[roles.ai-engineer.haystacks]
docs = ".terraphim/haystacks/docs"
code = "."

[sufficiency]
min_coverage = 0.7
min_kg_confidence = 0.5
min_diversity = 2
min_results = 3

[kg_boost]
weight = 1.0

[rlm]
max_tokens = 2000
temperature = 0.3
context_window = 32768
