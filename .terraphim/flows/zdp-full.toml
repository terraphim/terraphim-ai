# k=3 research+design flow with disciplined skills and KLS quality gates.
# Run with: adf-ctl flow zdp-full --context "issue=1882"
#
# Flow Phases:
#   1. Research: disciplined-research skill (k=3 parallel)
#   2. Research Quality Gate: disciplined-quality-evaluation (KLS)
#   3. Design: disciplined-design skill (k=3 parallel)
#   4. Design Quality Gate: disciplined-quality-evaluation (KLS)
#   5. Judge Decision: evaluate designs, decide if ready for implementation
#   6. Implementation: disciplined-implementation skill
#   7. Review: structured-pr-review skill
#   8. Validation: disciplined-validation skill
#   9. Verification: disciplined-verification skill
#   10. Final Judge: final approval verdict
#
# Models:
#   - Slot 1: opus via Claude CLI (primary), kimi fallback on rate limit
#   - Slot 2: kimi-for-coding/k2p6 via opencode
#   - Slot 3: openai/gpt-5.5 via opencode

name = "zdp-full"
project = "terraphim-ai"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"
timeout_secs = 14400

# ============================================================
# PHASE 1: RESEARCH
# ============================================================
[[steps]]
name = "matrix-research"
kind = "agent"
cli_tool = "opencode"
task = "You are running the disciplined-research skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-research skill: skill://disciplined-research\n2. Read the issue at https://git.terraphim.cloud/terraphim/terraphim-ai/issues/{{issue}}\n3. Apply the KLS 6-dimension framework to evaluate the research quality:\n   - Explicitity (are requirements unambiguous?)\n   - External Consistency (does it fit existing architecture?)\n   - Internal Consistency (are goals coherent?)\n   - Stakeholder Commitment (are stakeholders aligned?)\n   - Information Quality (is evidence solid?)\n   - Overall Coherence (does it hang together?)\n4. Write your research proposal to .docs/adf/{{issue}}/research-proposal-{{matrix.slot}}.md\n5. Classify the issue as: valid, stale, duplicate, blocked, or needs-rescope\n\nResearch proposal format (YAML frontmatter + markdown):\n---\nstage: research-proposal\nissue: {{issue}}\nslot: {{matrix.slot}}\nmodel: {{matrix.model}}\nprovider: {{matrix.provider}}\ntimestamp: FILL_IN\nclassification: FILL_IN\nkls_scores:\n  explicitity: FILL_IN\n  external_consistency: FILL_IN\n  internal_consistency: FILL_IN\n  stakeholder_commitment: FILL_IN\n  information_quality: FILL_IN\n  overall_coherence: FILL_IN\n---\n\n## Issue Summary\n[1 paragraph: what the issue asks for]\n\n## KLS Evaluation\n[Rate each dimension 1-5 with justification]\n\n## Classification\n[valid|stale|duplicate|blocked|needs-rescope with rationale]\n\n## Key Findings\n- [Finding 1]\n- [Finding 2]\n\n## Recommendations\n[What should happen next]\n"
model = "{{matrix.model}}"
provider = "{{matrix.provider}}"
timeout_secs = 600
on_fail = "continue"

[steps.matrix]
max_parallel = 3
fail_strategy = "continue"

[[steps.matrix.params]]
slot = "1"
model = "opus"
provider = "claude"
cli_tool = "claude"
fallback_model = "kimi-for-coding/k2p6"
fallback_provider = "kimi"

[[steps.matrix.params]]
slot = "2"
model = "kimi-for-coding/k2p6"
provider = "kimi"
cli_tool = "opencode"

[[steps.matrix.params]]
slot = "3"
model = "openai/gpt-5.5"
provider = "openai"
cli_tool = "opencode"

# Gate: matrix-research step ran (check exit_code)
[[steps]]
name = "gate-research"
kind = "gate"
condition = "{{steps.matrix-research.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 1B: RESEARCH QUALITY EVALUATION (KLS)
# ============================================================
[[steps]]
name = "research-quality"
kind = "agent"
cli_tool = "opencode"
task = "You are evaluating the research quality for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-quality-evaluation skill: skill://disciplined-quality-evaluation\n2. Read all research proposals:\n   - .docs/adf/{{issue}}/research-proposal-1.md\n   - .docs/adf/{{issue}}/research-proposal-2.md\n   - .docs/adf/{{issue}}/research-proposal-3.md\n3. Evaluate each proposal using the KLS 6-dimension framework:\n   - Explicitity (1-5): Are requirements unambiguous and complete?\n   - External Consistency (1-5): Does it fit existing architecture?\n   - Internal Consistency (1-5): Are goals coherent?\n   - Stakeholder Commitment (1-5): Are stakeholders aligned?\n   - Information Quality (1-5): Is evidence solid?\n   - Overall Coherence (1-5): Does it hang together?\n4. Write the quality evaluation to .docs/adf/{{issue}}/researchquality-evaluation.md\n\nQuality evaluation format (YAML frontmatter + markdown):\n---\nstage: research-quality-evaluation\nissue: {{issue}}\ntimestamp: FILL_IN\noverall_quality_score: FILL_IN\npasses_quality_gate: [true|false]\n---\n\n## Overall Quality Score\n[1-5 rating with rationale]\n\n## Per-Proposal Evaluation\n[Evaluation of each proposal]\n\n## Quality Gate Decision\n[PASS/FAIL with rationale - must score >= 3.0 overall to pass]\n\n## Recommendations\n[Any quality improvements needed before design]\n"
model = "kimi-for-coding/k2p6"
provider = "kimi"
timeout_secs = 300
on_fail = "continue"

# Gate: quality evaluation passes
[[steps]]
name = "gate-research-quality"
kind = "gate"
condition = "{{steps.research-quality.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 2: DESIGN
# ============================================================
[[steps]]
name = "matrix-design"
kind = "agent"
cli_tool = "opencode"
task = "You are running the disciplined-design skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-design skill: skill://disciplined-design\n2. Read the research quality evaluation at .docs/adf/{{issue}}/research-quality-evaluation.md\n3. Read the research proposals at:\n   - .docs/adf/{{issue}}/research-proposal-1.md\n   - .docs/adf/{{issue}}/research-proposal-2.md\n   - .docs/adf/{{issue}}/research-proposal-3.md\n4. Create a design proposal using disciplined-design methodology\n5. Write your design to .docs/adf/{{issue}}/design-proposal-{{matrix.slot}}.md\n\nDesign proposal format (YAML frontmatter + markdown):\n---\nstage: design-proposal\nissue: {{issue}}\nslot: {{matrix.slot}}\nmodel: {{matrix.model}}\nprovider: {{matrix.provider}}\ntimestamp: FILL_IN\n---\n\n## Problem Statement\n[What this design solves]\n\n## Architecture\n[Proposed architecture with trade-offs]\n\n## Implementation Plan\n[Step-by-step implementation]\n\n## File Changes\n[List of files to create/modify]\n\n## Risks and Mitigations\n[Identified risks and how to mitigate]\n\n## Acceptance Criteria\n[How to verify the implementation]\n"
model = "{{matrix.model}}"
provider = "{{matrix.provider}}"
timeout_secs = 900
on_fail = "continue"

# Gate: matrix-design step ran
[[steps]]
name = "gate-design"
kind = "gate"
condition = "{{steps.matrix-design.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 2B: DESIGN QUALITY EVALUATION (KLS)
# ============================================================
[[steps]]
name = "design-quality"
kind = "agent"
cli_tool = "opencode"
task = "You are evaluating the design quality for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-quality-evaluation skill: skill://disciplined-quality-evaluation\n2. Read all design proposals:\n   - .docs/adf/{{issue}}/design-proposal-1.md\n   - .docs/adf/{{issue}}/design-proposal-2.md\n   - .docs/adf/{{issue}}/design-proposal-3.md\n3. Read the research synthesis for context:\n   - .docs/adf/{{issue}}/research-synthesis.md\n4. Evaluate each design using the KLS 6-dimension framework:\n   - Explicitity (1-5): Are specifications unambiguous?\n   - External Consistency (1-5): Does it fit existing architecture?\n   - Internal Consistency (1-5): Is the design coherent?\n   - Stakeholder Commitment (1-5): Would stakeholders accept this?\n   - Information Quality (1-5): Is evidence solid?\n   - Overall Coherence (1-5): Does it hang together?\n5. Write the quality evaluation to .docs/adf/{{issue}}/designquality-evaluation.md\n\nQuality evaluation format (YAML frontmatter + markdown):\n---\nstage: design-quality-evaluation\nissue: {{issue}}\ntimestamp: FILL_IN\noverall_quality_score: FILL_IN\npasses_quality_gate: [true|false]\n---\n\n## Overall Quality Score\n[1-5 rating with rationale]\n\n## Per-Design Evaluation\n[Evaluation of each design]\n\n## Quality Gate Decision\n[PASS/FAIL with rationale - must score >= 3.0 overall to pass]\n\n## Recommendations\n[Any quality improvements needed before implementation]\n"
model = "kimi-for-coding/k2p6"
provider = "kimi"
timeout_secs = 300
on_fail = "continue"

# Gate: quality evaluation passes
[[steps]]
name = "gate-design-quality"
kind = "gate"
condition = "{{steps.design-quality.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 3: JUDGE DECISION - evaluate designs, decide implementation readiness
# ============================================================
[[steps]]
name = "judge-decision"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are the judge for the design phase on issue #{{issue}}.\nRead the 3 design proposals at:\n  - .docs/adf/{{issue}}/design-proposal-1.md\n  - .docs/adf/{{issue}}/design-proposal-2.md\n  - .docs/adf/{{issue}}/design-proposal-3.md\n\nRead the design quality evaluation:\n  - .docs/adf/{{issue}}/design-quality-evaluation.md\n\nRead the research synthesis for context:\n  - .docs/adf/{{issue}}/research-synthesis.md\n\nYour task: judge-evaluate the designs and decide if ready for implementation.\n\nJudge decision format (YAML frontmatter + markdown):\n---\nstage: judge-decision\nissue: {{issue}}\ntimestamp: FILL_IN\nproceed_to_implementation: [true|false]\nchosen_design: [slot number]\n---\n\n## Judge Decision\n[PROCEED/DEFER with rationale]\n\n## Best Design\n[Which design is best and why]\n\n## Design Evaluation\n[Comparison of all 3 designs against criteria]\n\n## Readiness Assessment\n[Is the design ready for implementation? What gaps remain?]\n\n## Open Questions\n[Questions to resolve before implementation]\n"
timeout_secs = 600

# Gate: judge must approve implementation
[[steps]]
name = "gate-judge"
kind = "gate"
condition = "{{steps.judge-decision.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 4: IMPLEMENTATION
# ============================================================
[[steps]]
name = "implementation"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are running the disciplined-implementation skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-implementation skill: skill://disciplined-implementation\n2. Read the chosen design at:\n   - .docs/adf/{{issue}}/design-proposal-[chosen-slot].md\n3. Read the design synthesis for context:\n   - .docs/adf/{{issue}}/design-synthesis.md\n4. Implement the design following disciplined-implementation methodology:\n   - TDD approach: write tests first\n   - Incremental commits\n   - Verify each step\n5. Write implementation status to .docs/adf/{{issue}}/implementation-status.md\n\nImplementation status format (YAML frontmatter + markdown):\n---\nstage: implementation-status\nissue: {{issue}}\ntimestamp: FILL_IN\nimplementation_complete: [true|false]\nfiles_created: [list]\nfiles_modified: [list]\ntests_added: [list]\n---\n\n## Implementation Summary\n[What was implemented]\n\n## Files Created\n[List of new files]\n\n## Files Modified\n[List of changed files]\n\n## Tests Added\n[List of tests]\n\n## Verification\n[How implementation was verified]\n\n## Issues Encountered\n[Any problems during implementation]\n"
timeout_secs = 3600

# ============================================================
# PHASE 5: REVIEW - structured-pr-review
# ============================================================
[[steps]]
name = "review"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are running the structured-pr-review skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the structured-pr-review skill: skill://structured-pr-review\n2. Read the implementation status at:\n   - .docs/adf/{{issue}}/implementation-status.md\n3. Review the implementation code and changes\n4. Write the review findings to .docs/adf/{{issue}}/review-findings.md\n\nReview findings format (YAML frontmatter + markdown):\n---\nstage: review-findings\nissue: {{issue}}\ntimestamp: FILL_IN\nreview_complete: [true|false]\n---\n\n## Review Summary\n[Overall assessment]\n\n## Issues Found\n[List of issues by severity]\n\n## P0 Critical\n[Must fix before merge]\n\n## P1 Important\n[Should fix before merge]\n\n## P2 Minor\n[Consider fixing]\n\n## Recommendations\n[How to address issues]\n"
timeout_secs = 600

# ============================================================
# PHASE 6: VALIDATION - disciplined-validation skill
# ============================================================
[[steps]]
name = "validation"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are running the disciplined-validation skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-validation skill: skill://disciplined-validation\n2. Read the implementation status at:\n   - .docs/adf/{{issue}}/implementation-status.md\n3. Read the review findings at:\n   - .docs/adf/{{issue}}/review-findings.md\n4. Read the final verdict at:\n   - .docs/adf/{{issue}}/final-verdict.md\n5. Validate the implementation against original requirements\n6. Write validation report to .docs/adf/{{issue}}/validation-report.md\n\nValidation report format (YAML frontmatter + markdown):\n---\nstage: validation-report\nissue: {{issue}}\ntimestamp: FILL_IN\nvalidation_complete: [true|false]\npasses_validation: [true|false]\n---\n\n## Validation Summary\n[Overall validation result]\n\n## Requirements Verification\n[Does implementation meet each requirement?]\n\n## Acceptance Criteria Check\n[Does implementation meet acceptance criteria from design?]\n\n## Issues Found\n[Any issues discovered during validation]\n\n## Recommendations\n[What needs to happen before final approval]\n"
timeout_secs = 600

# Gate: validation must pass
[[steps]]
name = "gate-validation"
kind = "gate"
condition = "{{steps.validation.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 7: VERIFICATION - disciplined-verification skill
# ============================================================
[[steps]]
name = "verification"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are running the disciplined-verification skill for issue #{{issue}}.\n\nYour task:\n1. Load and apply the disciplined-verification skill: skill://disciplined-verification\n2. Read the validation report at:\n   - .docs/adf/{{issue}}/validation-report.md\n3. Read the implementation status at:\n   - .docs/adf/{{issue}}/implementation-status.md\n4. Verify implementation against design specifications\n5. Write verification report to .docs/adf/{{issue}}/verification-report.md\n\nVerification report format (YAML frontmatter + markdown):\n---\nstage: verification-report\nissue: {{issue}}\ntimestamp: FILL_IN\nverification_complete: [true|false]\npasses_verification: [true|false]\n---\n\n## Verification Summary\n[Overall verification result]\n\n## Design Specification Check\n[Does implementation match design?]\n\n## Test Coverage\n[Are tests adequate?]\n\n## Code Quality\n[Does code meet quality standards?]\n\n## Issues Found\n[Any issues discovered during verification]\n\n## Recommendations\n[What needs to happen before final approval]\n"
timeout_secs = 600

# Gate: verification must pass
[[steps]]
name = "gate-verification"
kind = "gate"
condition = "{{steps.verification.exit_code}} == 0"
on_fail = "abort"

# ============================================================
# PHASE 8: FINAL JUDGE - final approval verdict
# ============================================================
[[steps]]
name = "final-judge"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are the final approval judge for issue #{{issue}}.\n\nYour task:\n1. Review the validation report at:\n   - .docs/adf/{{issue}}/validation-report.md\n2. Review the verification report at:\n   - .docs/adf/{{issue}}/verification-report.md\n3. Review the implementation status at:\n   - .docs/adf/{{issue}}/implementation-status.md\n4. Review the review findings at:\n   - .docs/adf/{{issue}}/review-findings.md\n5. Make final approval decision\n6. Write final approval verdict to .docs/adf/{{issue}}/final-approval-verdict.md\n\nFinal approval verdict format (YAML frontmatter + markdown):\n---\nstage: final-approval-verdict\nissue: {{issue}}\ntimestamp: FILL_IN\napproved: [true|false]\nready_for_merge: [true|false]\n---\n\n## Final Approval Decision\n[APPROVED/REJECTED with rationale]\n\n## Validation Summary\n[Did validation pass?]\n\n## Verification Summary\n[Did verification pass?]\n\n## Outstanding Issues\n[Any remaining P0/P1 issues]\n\n## Final Recommendations\n[What must happen before merge]\n"
timeout_secs = 300

# Gate: final approval must be granted
[[steps]]
name = "gate-final"
kind = "gate"
condition = "{{steps.final-judge.exit_code}} == 0"
on_fail = "abort"
