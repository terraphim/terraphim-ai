# k=3 research flow: disciplined-research skill + judge-compare synthesis.
# Run with: adf-ctl flow zdp-research --context "issue=1882"
#
# Steps:
#   1. matrix-research: 3 parallel proposals using disciplined-research skill
#   2. gate-check: require at least 2 proposals to succeed
#   3. synthesize: judge-compares 3 proposals -> research-synthesis.md
#   4. checkpoint: pause for human review

name = "zdp-research"
project = "terraphim-ai"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"
timeout_secs = 1800

[[steps]]
name = "matrix-research"
kind = "agent"
cli_tool = "opencode"
task = "You are running the disciplined-research skill for issue #{{issue}}.\n\nYour task:\n1. Use the disciplined-research skill to produce a research proposal\n2. Load the skill: skill://disciplined-research\n3. Read the issue at https://git.terraphim.cloud/terraphim/terraphim-ai/issues/{{issue}}\n4. Analyse the codebase to understand current state\n5. Write a research proposal to .docs/adf/{{issue}}/research-proposal-{{matrix.slot}}.md\n6. Classify the issue as: valid, stale, duplicate, blocked, or needs-rescope\n\nResearch proposal format (YAML frontmatter + markdown):\n---\nstage: research-proposal\nissue: {{issue}}\nslot: {{matrix.slot}}\nmodel: {{matrix.model}}\ntimestamp: FILL_IN\nclassification: FILL_IN\n---\n\n## Issue Summary\n[1 paragraph: what the issue asks for]\n\n## Current State\n[What exists in the codebase today]\n\n## Classification\n[valid|stale|duplicate|blocked|needs-rescope with rationale]\n\n## Key Findings\n- [Finding 1]\n- [Finding 2]\n\n## Recommendations\n[What should happen next]\n"
model = "{{matrix.model}}"
provider = "{{matrix.provider}}"
timeout_secs = 600
on_fail = "continue"

[steps.matrix]
max_parallel = 3
fail_strategy = "continue"

[[steps.matrix.params]]
slot = "1"
model = "opus"
provider = "claude"

[[steps.matrix.params]]
slot = "2"
model = "kimi-for-coding/k2p6"
provider = "kimi"

[[steps.matrix.params]]
slot = "3"
model = "openai/gpt-5.5"
provider = "openai"

[[steps]]
name = "gate-check"
kind = "gate"
condition = "{{steps.matrix-research.success_count}} >= 2"
on_fail = "skip_failed"

[[steps]]
name = "synthesize"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are the judge for a k=3 research panel on issue #{{issue}}.\n\nRead the 3 proposals at:\n  - .docs/adf/{{issue}}/research-proposal-1.md\n  - .docs/adf/{{issue}}/research-proposal-2.md\n  - .docs/adf/{{issue}}/research-proposal-3.md\n\nYour task: judge-compare the 3 proposals and write a synthesis to:\n.docs/adf/{{issue}}/research-synthesis.md\n\nUse the classification from the research proposals. If they disagree, pick the best reasoning.\nIdentify the strongest findings from any proposal.\n\nSynthesis format:\n---\nstage: research-synthesis\nissue: {{issue}}\ntimestamp: FILL_IN\nclassification: [chosen classification]\n---\n\n## Final Classification\n[Classification with rationale]\n\n## Synthesis of Findings\n[What the 3 proposals agree on, and where they differ]\n\n## Strongest Proposal\n[Which proposal is best and why]\n\n## Recommendations\n[Next steps based on the synthesis]\n"
timeout_secs = 600

[[steps]]
name = "human-review"
kind = "checkpoint"
