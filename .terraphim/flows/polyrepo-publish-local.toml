export POLYREPO_PUBLISH_MODE=dependency
bash scripts/adf-setup/polyrepo-publish/polyrepo-publish.sh full terraphim-service
"""
timeout_secs = 1200
on_fail = "abort"

[[steps]]
name = "dry-run-terraphim-agents"
kind = "action"
command = """
export POLYREPO_DRY_RUN=1
export POLYREPO_WORK_DIR=/tmp/terraphim-polyrepo-publish-local
export POLYREPO_PUBLISH_MODE=dependency
bash scripts/adf-setup/polyrepo-publish/polyrepo-publish.sh full terraphim-agents
"""
timeout_secs = 1200
on_fail = "abort"

[[steps]]
name = "dry-run-terraphim-kg-agents"
kind = "action"
command = """
export POLYREPO_DRY_RUN=1
export POLYREPO_WORK_DIR=/tmp/terraphim-polyrepo-publish-local
export POLYREPO_PUBLISH_MODE=dependency
