# Local dry-run for the polyrepo GitHub publishing pipeline.
#
# Run from the repository root:
#   POLYREPO_DRY_RUN=1 adf-ctl --local flow polyrepo-publish-local
#
# This intentionally does not push to Gitea, create GitHub repositories,
# dispatch GitHub workflows, or publish crates. It proves local orchestration,
# secret scanning, Cargo rewrite safety, and repo staging before the same
# pipeline is promoted to bigbox.

name = "polyrepo-publish-local"
project = "terraphim"
repo_path = "."
base_branch = "main"
timeout_secs = 7200

[[steps]]
name = "local-preflight"
kind = "action"
command = """
set -euo pipefail
test -n "${GITEA_TOKEN:-}"
bash -n scripts/adf-setup/polyrepo-publish/polyrepo-publish.sh
mkdir -p /tmp/terraphim-polyrepo-publish-local
echo "POLYREPO_DRY_RUN=1"
echo "POLYREPO_WORK_DIR=/tmp/terraphim-polyrepo-publish-local"
"""
timeout_secs = 60
on_fail = "abort"

[[steps]]
name = "dry-run-terraphim-core"
kind = "action"
command = """
export POLYREPO_DRY_RUN=1
export POLYREPO_WORK_DIR=/tmp/terraphim-polyrepo-publish-local
export POLYREPO_PUBLISH_MODE=dependency
bash scripts/adf-setup/polyrepo-publish/polyrepo-publish.sh full terraphim-core
"""
timeout_secs = 1200
on_fail = "abort"

[[steps]]
name = "dry-run-terraphim-config-persistence"
kind = "action"
command = """
export POLYREPO_DRY_RUN=1
export POLYREPO_WORK_DIR=/tmp/terraphim-polyrepo-publish-local
export POLYREPO_PUBLISH_MODE=dependency
bash scripts/adf-setup/polyrepo-publish/polyrepo-publish.sh full terraphim-config-persistence
"""
timeout_secs = 1200
on_fail = "abort"

