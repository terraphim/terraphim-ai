# k=3 design flow: disciplined-design skill + judge-evaluate synthesis.
# Run with: adf-ctl flow zdp-design --context "issue=1882"
#
# Steps:
#   1. matrix-design: 3 parallel design proposals using disciplined-design skill
#   2. gate-check: require at least 2 proposals to succeed
#   3. synthesize: judge-evaluates designs -> design-synthesis.md
#   4. checkpoint: pause for human review

name = "zdp-design"
project = "terraphim-ai"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"
timeout_secs = 1800

[[steps]]
name = "matrix-design"
kind = "agent"
cli_tool = "opencode"
task = "You are running the disciplined-design skill for issue #{{issue}}.\n\nYour task:\n1. Use the disciplined-design skill to produce a design plan\n2. Load the skill: skill://disciplined-design\n3. Read the research synthesis at .docs/adf/{{issue}}/research-synthesis.md\n4. Read any existing design docs in .docs/design-*.md related to this issue\n5. Create a comprehensive design plan in .docs/adf/{{issue}}/design-proposal-{{matrix.slot}}.md\n\nDesign proposal format (YAML frontmatter + markdown):\n---\nstage: design-proposal\nissue: {{issue}}\nslot: {{matrix.slot}}\nmodel: {{matrix.model}}\ntimestamp: FILL_IN\n---\n\n## Problem Statement\n[What this design solves]\n\n## Architecture\n[Proposed architecture with trade-offs]\n\n## Implementation Plan\n[Step-by-step implementation]\n\n## File Changes\n[List of files to create/modify]\n\n## Risks and Mitigations\n[Identified risks and how to mitigate]\n\n## Acceptance Criteria\n[How to verify the implementation]\n"
model = "{{matrix.model}}"
provider = "{{matrix.provider}}"
timeout_secs = 900
on_fail = "continue"

[steps.matrix]
max_parallel = 3
fail_strategy = "continue"

[[steps.matrix.params]]
slot = "1"
model = "opus"
provider = "claude"

[[steps.matrix.params]]
slot = "2"
model = "kimi-for-coding/k2p6"
provider = "kimi"

[[steps.matrix.params]]
slot = "3"
model = "openai/gpt-5.4"
provider = "openai"

[[steps]]
name = "gate-check"
kind = "gate"
condition = "{{steps.matrix-design.success_count}} >= 2"
on_fail = "skip_failed"

[[steps]]
name = "synthesize"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are the judge for a k=3 design panel on issue #{{issue}}.\n\nRead the 3 design proposals at:\n  - .docs/adf/{{issue}}/design-proposal-1.md\n  - .docs/adf/{{issue}}/design-proposal-2.md\n  - .docs/adf/{{issue}}/design-proposal-3.md\n\nRead the research synthesis for context:\n  - .docs/adf/{{issue}}/research-synthesis.md\n\nYour task: judge-evaluate the 3 designs and write a synthesis to:\n.docs/adf/{{issue}}/design-synthesis.md\n\nEvaluate each design on:\n- Completeness (covers all acceptance criteria)\n- Feasibility (can be implemented in scope)\n- Risk (identifies and mitigates risks)\n- Consistency (consistent with existing architecture)\n\nDesign synthesis format:\n---\nstage: design-synthesis\nissue: {{issue}}\ntimestamp: FILL_IN\nchosen_design: [slot number]\n---\n\n## Best Design\n[Which design is best and why]\n\n## Design Evaluation\n[Comparison of all 3 designs against criteria]\n\n## Recommended Implementation\n[Hybrid approach if needed, or single best design]\n\n## Open Questions\n[Questions to resolve before implementation]\n"
timeout_secs = 600

[[steps]]
name = "human-review"
kind = "checkpoint"
