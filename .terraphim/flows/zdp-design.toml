# k=3 design flow: matrix fan-out with 3 design proposals + judge synthesis.
# Run with: adf flow zdp-design --context "issue=1882"
#
# Steps:
#   1. matrix-design: 3 parallel design proposals (sequential execution, k=3)
#   2. gate-check: require at least 2 proposals to succeed
#   3. synthesize: judge-compares 3 proposals -> design-synthesis.md
#   4. checkpoint: pause for human review
#
# Prerequisites: zdp-research flow should have been run first so that
#   research-synthesis.md exists at .docs/adf/{{issue}}/

name = "zdp-design"
project = "terraphim-ai"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"
timeout_secs = 1800

[[steps]]
name = "matrix-design"
kind = "agent"
cli_tool = "opencode"
task = "You are running the disciplined-design skill for issue #{{issue}}.\n\nFirst read the research synthesis at .docs/adf/{{issue}}/research-synthesis.md\nto understand the classification and findings.\n\nYour task: Create a detailed implementation plan and write it to:\n.docs/adf/{{issue}}/design-proposal-{{matrix.slot}}.md\n\nDesign proposal format:\n---\nstage: design-proposal\nissue: {{issue}}\nslot: {{matrix.slot}}\nmodel: {{matrix.model}}\ntimestamp: FILL_IN\n---\n\n## Design Overview\n[High-level description of the approach]\n\n## File Changes\n| File | Change |\n|------|--------|\n| | |\n\n## Implementation Steps\n1. [Step 1]\n2. [Step 2]\n3. [Step 3]\n\n## Test Strategy\n[How to verify this works]\n\n## Rollback Plan\n[How to undo if needed]\n\n## Risk Assessment\n| Risk | Likelihood | Impact | Mitigation |\n|------|------------|--------|------------|\n| | | | |\n"
model = "{{matrix.model}}"
timeout_secs = 600
on_fail = "continue"

[steps.matrix]
max_parallel = 3
fail_strategy = "continue"

[[steps.matrix.params]]
slot = "1"
model = "opus"
provider = "anthropic"

[[steps.matrix.params]]
slot = "2"
model = "kimi-for-coding/k2p6"
provider = "kimi"

[[steps.matrix.params]]
slot = "3"
model = "openai/gpt-5.4"
provider = "openai"

[[steps]]
name = "gate-check"
kind = "gate"
condition = "{{steps.matrix-design.success_count}} >= 2"
on_fail = "skip_failed"

[[steps]]
name = "synthesize"
kind = "agent"
cli_tool = "opencode"
model = "kimi-for-coding/k2p6"
provider = "kimi"
task = "You are the judge for a k=3 design panel on issue #{{issue}}.\n\nRead the 3 design proposals at:\n  - .docs/adf/{{issue}}/design-proposal-1.md\n  - .docs/adf/{{issue}}/design-proposal-2.md\n  - .docs/adf/{{issue}}/design-proposal-3.md\n\nAlso read the research synthesis:\n.docs/adf/{{issue}}/research-synthesis.md\n\nYour task: judge-compare the 3 proposals and write a synthesis to:\n.docs/adf/{{issue}}/design-synthesis.md\n\nPick the best elements from each proposal. Produce a merged implementation plan.\n\nSynthesis format:\n---\nstage: design-synthesis\nissue: {{issue}}\ntimestamp: FILL_IN\n---\n\n## Final Design\n[Merged design overview]\n\n## File Changes (Final)\n| File | Change |\n|------|--------|\n| | |\n\n## Implementation Steps (Final)\n1. [Step 1]\n2. [Step 2]\n...\n\n## Test Strategy (Final)\n[Verification approach]\n\n## Risk Mitigation\n[How risks are addressed]\n"
timeout_secs = 600

[[steps]]
name = "human-review"
kind = "checkpoint"
