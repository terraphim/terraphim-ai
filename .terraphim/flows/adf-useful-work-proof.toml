# Proves `adf-ctl flow` can execute useful non-model work end-to-end.
# First proof is intentionally k=1: one matrix slot and one proof artefact.
# Run with:
# cargo run -p terraphim_orchestrator --bin adf-ctl -- flow adf-useful-work-proof --context "issue=1890 k=1"

name = "adf-useful-work-proof"
project = "terraphim-ai"
repo_path = "."
timeout_secs = 300

[[steps]]
name = "matrix-slot-work"
kind = "action"
command = "mkdir -p .docs/adf/{{issue}} && printf 'slot=%s\nmodel=%s\nissue=%s\nflow=%s\nexit_status=success\n' '{{matrix.slot}}' '{{matrix.model}}' '{{issue}}' '{{flow.name}}' > .docs/adf/{{issue}}/adf-flow-proof-slot-{{matrix.slot}}.txt"
timeout_secs = 30
on_fail = "abort"

[steps.matrix]
max_parallel = 1
fail_strategy = "abort"

[[steps.matrix.params]]
slot = "1"
model = "local-shell-proof"

[[steps]]
name = "require-one-slot"
kind = "gate"
condition = "{{steps.matrix-slot-work.success_count}} == 1"
on_fail = "abort"

[[steps]]
name = "assemble-proof"
kind = "action"
command = "printf '# ADF Flow Useful Work Proof\n\nIssue: %s\nFlow: %s\nSlot count: %s\nMatrix exit codes: %s\nGenerated: 2026-05-29 16:33 BST\n\n## Slot Outputs\n\n' '{{issue}}' '{{flow.name}}' '{{steps.matrix-slot-work.success_count}}' '{{steps.matrix-slot-work.all_exit_codes}}' > .docs/adf/{{issue}}/adf-flow-useful-work-proof.md && for file in .docs/adf/{{issue}}/adf-flow-proof-slot-*.txt; do printf '### %s\n\n```text\n' \"$file\" >> .docs/adf/{{issue}}/adf-flow-useful-work-proof.md; sed 's/$//' \"$file\" >> .docs/adf/{{issue}}/adf-flow-useful-work-proof.md; printf '\n```\n\n' >> .docs/adf/{{issue}}/adf-flow-useful-work-proof.md; done"
timeout_secs = 30
on_fail = "abort"
