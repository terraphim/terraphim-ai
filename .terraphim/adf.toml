# Local ADF configuration for Terraphim AI.
# Provides real issue processing via adf-issue-stage and k=3 planning via adf flow.
#
# Discovery:
#   - `adf --local --check` validates this file
#   - `adf --local --agent NAME` runs a named agent via adf-issue-stage
#   - `adf flow <name> --context "issue=N"` runs a flow from .terraphim/flows/<name>.toml
#
# Agents use adf-issue-stage which produces structured artefacts in .docs/adf/<issue>/
# instead of template comments.

project_id = "terraphim-ai"
name = "Terraphim AI"
working_dir = "/home/alex/projects/terraphim/terraphim-ai"
tick_interval_secs = 1
disk_usage_threshold = 100

[nightwatch]

[compound_review]
schedule = "0 2 * * *"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"

[direct_dispatch]
socket_path = "/tmp/adf-ctl.sock"

[[projects]]
id = "terraphim-ai"
working_dir = "/home/alex/projects/terraphim/terraphim-ai"

# --- Core ZDP agents ---

[[agents]]
name = "disciplined-research-agent"
layer = "Core"
cli_tool = "/home/alex/projects/terraphim/terraphim-ai/.terraphim/bin/adf-issue-stage"
task = "stage=disciplined-research; issue={{issue}}"
project = "terraphim-ai"

