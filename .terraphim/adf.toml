# Local ADF configuration for repository-level end-to-end dispatch testing.
#
# This file intentionally satisfies both local loaders:
# - `adf --local --check` / `adf --local --agent NAME` use ProjectAdfConfig.
# - `adf .terraphim/adf.toml` uses the full OrchestratorConfig and enables
#   the direct Unix socket consumed by `adf-ctl --local trigger --direct`.

project_id = "terraphim-ai"
name = "Terraphim AI"
working_dir = "/home/alex/projects/terraphim/terraphim-ai"
tick_interval_secs = 1
disk_usage_threshold = 100

[nightwatch]

[compound_review]
schedule = "0 2 * * *"
repo_path = "/home/alex/projects/terraphim/terraphim-ai"

[direct_dispatch]
socket_path = "/tmp/adf-ctl.sock"

[[projects]]
id = "terraphim-ai"
working_dir = "/home/alex/projects/terraphim/terraphim-ai"

[[agents]]
name = "implementation-swarm"
layer = "Core"
cli_tool = "/home/alex/projects/terraphim/terraphim-ai/.terraphim/bin/adf-e2e-stage"
task = "stage=implementation-swarm; pick and progress the Gitea task via local direct dispatch"
project = "terraphim-ai"

[[agents]]
name = "disciplined-research-agent"
layer = "Core"
cli_tool = "/home/alex/projects/terraphim/terraphim-ai/.terraphim/bin/adf-e2e-stage"
