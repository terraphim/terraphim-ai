working_dir = "/home/alex/terraphim-ai"
restart_cooldown_secs = 900
max_restart_count = 3
tick_interval_secs = 30

[nightwatch]
eval_interval_secs = 300
minor_threshold = 0.10
moderate_threshold = 0.20
severe_threshold = 0.40
critical_threshold = 0.70

[compound_review]
schedule = "0 2 * * *"
max_duration_secs = 1800
repo_path = "/home/alex/terraphim-ai"
create_prs = false
cli_tool = "/home/alex/.bun/bin/opencode"
provider = "opencode-go"
model = "glm-5"

# Safety layer: always running, auto-restart on failure

[[agents]]
name = "security-sentinel"
layer = "Safety"
cli_tool = "/home/alex/.bun/bin/opencode"
provider = "opencode-go"
model = "kimi-k2.5"
fallback_provider = "opencode-go"
fallback_model = "glm-5"
persona = "Vigil"
skill_chain = ["security-audit", "code-review", "quality-oversight"]
task = """Run security audit on the terraphim-ai project at /home/alex/terraphim-ai:
1. cd /home/alex/terraphim-ai && cargo audit (check for known CVEs in dependencies)
2. Review Cargo.lock for outdated dependencies with known vulnerabilities
3. Scan for hardcoded secrets or API keys: grep -r "sk-" "api_key" "secret" in src/
4. Check unsafe blocks: grep -rn "unsafe" crates/ and assess necessity
5. Review recent commits for security-relevant changes: git log --since=24hours --oneline
6. Also check server exposure: ss -tlnp for unexpected listening ports
7. Generate a security report at reports/security-YYYYMMDD.md (relative to working dir)
Prioritize any CVEs or critical vulnerabilities in project dependencies."""
capabilities = ["security", "vulnerability-scanning", "compliance"]
max_memory_bytes = 2147483648

[[agents]]
name = "meta-coordinator"
layer = "Safety"
cli_tool = "/home/alex/.local/bin/claude"
provider = "anthropic"
model = "opus-4-6"
persona = "Ferrox"
skill_chain = ["session-search", "local-knowledge", "insight-synthesis", "perspective-investigation"]
task = """Monitor the AI Dark Factory system health:
1. Read /opt/ai-dark-factory/logs/telemetry.jsonl for recent agent run data
2. Detect anomalies: agents failing repeatedly, unusual durations, missing runs
3. Read /opt/ai-dark-factory/logs/alerts.log for critical alerts
4. Check disk usage and system resources
5. Generate a daily coordination summary at /opt/ai-dark-factory/reports/coordination-YYYYMMDD.md
Keep it brief and actionable."""
capabilities = ["monitoring", "coordination", "health-check"]

[[agents]]
name = "compliance-watchdog"
layer = "Safety"
cli_tool = "/home/alex/.bun/bin/opencode"
provider = "opencode-go"
model = "kimi-k2.5"
fallback_provider = "zai-coding-plan"
fallback_model = "glm-4.7"
persona = "Vigil"
skill_chain = ["security-audit", "responsible-ai", "via-negativa-analysis"]
