name: Publish Rust Crates

# Manual dispatch and polyrepo-publish pipeline (crate_list input).
# Tag releases no longer publish crates from terraphim-ai; use polyrepo-publish
# for extracted crates or this workflow for monorepo-resident libraries.
on:
  workflow_dispatch:
    inputs:
      crate_list:
        description: 'Space-separated crate package names to publish in order'
        required: false
        type: string
      crate:
        description: 'Single crate to publish (legacy alias; use crate_list instead)'
        required: false
        type: string
      dry_run:
        description: 'Run cargo publish --dry-run only'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Get crates.io token from 1Password
        id: token
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          TOKEN=$(op read "op://TerraphimPlatform/crates.io.token/token")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Resolve crate list
        id: crates
        run: |
          if [ -n "${{ inputs.crate_list }}" ]; then
            echo "list=${{ inputs.crate_list }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.crate }}" ]; then
            echo "list=${{ inputs.crate }}" >> $GITHUB_OUTPUT
          else
            echo "list=terraphim_update terraphim_github_runner terraphim_gitea_runner terraphim_rlm" >> $GITHUB_OUTPUT
          fi

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.token.outputs.token }}
          CRATE_LIST: ${{ steps.crates.outputs.list }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/publish-crates.sh

          for crate in $CRATE_LIST; do
            ARGS="--crate $crate"
            if [ "$DRY_RUN" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "//; s/"//')
            ./scripts/publish-crates.sh $ARGS --version "$VERSION"
          done

      - name: Verify published packages
        if: inputs.dry_run != true
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "Publishing workflow completed for: $CRATE_LIST"