name: CI (Firecracker)

on:
  workflow_dispatch:
    inputs:
      vm_type:
        description: 'Firecracker VM image type'
        required: false
        default: 'focal-ci'
        type: choice
        options:
          - focal-ci
          - focal
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'terraphim_server/**'

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vm-infrastructure:
    name: Firecracker VM lifecycle proof
    # bigbox runners co-locate with fcctl-web at 127.0.0.1:8080 — must use bigbox label
    runs-on: [self-hosted, bigbox]
    timeout-minutes: 5
    env:
      FCCTL_URL: http://127.0.0.1:8080
      VM_TYPE: ${{ inputs.vm_type || 'focal-ci' }}

    steps:
      - name: Health check fcctl-web
        run: |
          curl -sf --retry 3 --retry-delay 2 $FCCTL_URL/health
          echo "fcctl-web is healthy"

      - name: Create VM
        id: vm
        run: |
          RESPONSE=$(curl -sf -X POST $FCCTL_URL/api/vms \
            -H 'Content-Type: application/json' \
            -d "{\"vm_type\": \"$VM_TYPE\"}")
          echo "$RESPONSE"
          VM_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          if [ -z "$VM_ID" ] || [ "$VM_ID" = "null" ]; then
            echo "ERROR: failed to parse vm id from response"
            exit 1
          fi
          echo "vm_id=$VM_ID" >> $GITHUB_OUTPUT
          echo "Created VM: $VM_ID"

      - name: Wait for VM ready
        run: |
          VM_ID="${{ steps.vm.outputs.vm_id }}"
          for i in $(seq 1 18); do
            STATUS=$(curl -sf $FCCTL_URL/api/vms/$VM_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "  attempt $i: status=$STATUS"
            if [ "$STATUS" = "running" ]; then
              echo "VM is running"
              break
            fi
            if [ "$i" = "18" ]; then
              echo "ERROR: VM did not reach running status within 90 seconds"
              exit 1
            fi
            sleep 5
          done

      - name: Execute command in VM
        run: |
          VM_ID="${{ steps.vm.outputs.vm_id }}"
          RESULT=$(curl -sf -X POST $FCCTL_URL/api/llm/execute \
            -H 'Content-Type: application/json' \
            -d "{
              \"vm_id\": \"$VM_ID\",
              \"code\": \"echo vm-ok && uname -r && id\",
              \"language\": \"bash\",
              \"agent_id\": \"ci-probe-${{ github.run_id }}\",
              \"timeout_ms\": 15000
            }")
          echo "$RESULT" | python3 -m json.tool
          echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); sys.exit(0 if r.get('exit_code')==0 else 1)"

      - name: Destroy VM
        if: always()
        run: |
          VM_ID="${{ steps.vm.outputs.vm_id }}"
          if [ -n "$VM_ID" ] && [ "$VM_ID" != "null" ]; then
            curl -sf -X DELETE $FCCTL_URL/api/vms/$VM_ID && echo "VM $VM_ID destroyed" || echo "VM cleanup failed (non-fatal)"
          fi

  rust-build:
    name: Rust build + test
    # Must run on bigbox: sccache binary lives at /home/alex/.local/bin and the
    # SeaweedFS S3 cache is bound to fcbr0 (172.26.0.1:8333), reachable only
    # from this host. Mac runners would fail on both counts.
    runs-on: [self-hosted, bigbox]
    timeout-minutes: 45
    # Route all rustc invocations through sccache backed by SeaweedFS S3 on
    # fcbr0. See .docs/adr-rust-build-cache-seaweedfs.md. Env is applied to
    # every step so cargo fmt/clippy/build/test all share the cache.
    env:
      RUSTC_WRAPPER: /home/alex/.local/bin/sccache
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: http://172.26.0.1:8333
      SCCACHE_S3_USE_SSL: "false"
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_KEY_PREFIX: terraphim-ai
      AWS_ACCESS_KEY_ID: any
      AWS_SECRET_ACCESS_KEY: any
      # sccache cannot cache incremental compilations; cargo dev profile
      # defaults to incremental=true. Disable to push more rustc invocations
      # through sccache. Cold-cache run showed 438 calls skipped for this
      # reason. See .docs/adr-rust-build-cache-seaweedfs.md.
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4

      - name: sccache start and zero stats
        run: |
          /home/alex/.local/bin/sccache --start-server || true
          /home/alex/.local/bin/sccache --zero-stats

      # zlob is default on terraphim_file_search + terraphim_mcp_server, so
      # fff-core/build.rs never hits its CI-detection panic branch and we
      # don't need the old `unset CI` workaround. zig 0.16 is installed on
      # bigbox; see .cargo/config.toml for the Darwin `dynamic_lookup`
      # linker workaround on local Mac dev.
      - name: cargo fmt --check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo test --workspace
        # Skipped tests, all of the same class: spawn `terraphim-agent` /
        # `terraphim_server` subprocesses on fixed ports and parse their
        # stdout. They fail on shared self-hosted runners because of port
        # / state residue from prior runs and missing data fixtures.
        # Firecracker VM isolation (vm-cargo-probe / future vm-test job)
        # will solve this class properly. Until then, skip:
        #   - test_chat_command: needs external LLM API credentials
        #   - test_end_to_end_server_workflow: real server on fixed port
        #   - search_robot_*: parse terraphim-agent CLI JSON output, need
        #     KG/data fixtures that aren't checked into the runner workspace
        run: |
          cargo test --workspace -- \
            --skip test_chat_command \
            --skip test_end_to_end_server_workflow \
            --skip search_robot_ \
            --skip search_format_json_

      - name: sccache stats
        if: always()
        run: /home/alex/.local/bin/sccache --show-stats

  vm-cargo-probe:
    # Proof-of-concept: dispatch a cargo build INTO a rust-ci Firecracker VM,
    # measure sccache hit rate against SeaweedFS S3 on fcbr0. Uses a tiny
    # synthetic crate (one dep) to stay within the VM's 4 GB rootfs while
    # still exercising the full dispatch path end-to-end:
    #   create VM -> SSH in -> cargo build -> sccache -> SeaweedFS -> destroy.
    # Full workspace dispatch is blocked on VM rootfs size / virtio-fs mount
    # support (follow-up task).
    name: Cargo build inside Firecracker VM
    runs-on: [self-hosted, bigbox]
    timeout-minutes: 10
    env:
      FCCTL_URL: http://127.0.0.1:8080
      SSH_KEY: /home/alex/projects/terraphim/firecracker-rust/firecracker-ci-artifacts/ubuntu-22.04.id_rsa

    steps:
      - name: Create rust-ci VM
        id: vm
        run: |
          RESPONSE=$(curl -sf -X POST $FCCTL_URL/api/vms \
            -H 'Content-Type: application/json' \
            -d '{"vm_type": "rust-ci"}')
          echo "$RESPONSE" | python3 -m json.tool
          VM_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "vm_id=$VM_ID" >> $GITHUB_OUTPUT

          # Poll for status=running AND non-empty ip_address. fcctl-web sets
          # status=running before the network agent populates ip_address, so
          # checking only status races. Allow 90 s for network settling on
          # top of boot.
          VM_IP=""
          for i in $(seq 1 30); do
            J=$(curl -sf $FCCTL_URL/api/vms/$VM_ID 2>/dev/null) || true
            STATUS=$(echo "$J" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status') or '')" 2>/dev/null || echo "")
            VM_IP=$(echo "$J" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ip_address') or '')" 2>/dev/null || echo "")
            echo "  attempt $i: status=$STATUS ip=$VM_IP"
            [ "$STATUS" = "running" ] && [ -n "$VM_IP" ] && break
            sleep 3
          done
          if [ -z "$VM_IP" ]; then
            echo "ERROR: VM did not report an ip_address after boot+settle"
            curl -sf $FCCTL_URL/api/vms/$VM_ID
            exit 1
          fi
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "VM_ID=$VM_ID VM_IP=$VM_IP"

      - name: cargo build + sccache stats in VM
        id: build
        run: |
          VM_IP="${{ steps.vm.outputs.vm_ip }}"
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i $SSH_KEY root@$VM_IP bash -s <<'REMOTE'
            set -e
            sccache --start-server || true
            sccache --zero-stats > /dev/null
            mkdir -p /tmp/probe-ci/src
            cat > /tmp/probe-ci/Cargo.toml <<EOF
          [package]
          name = "probe-ci"
          version = "0.0.1"
          edition = "2021"
          [dependencies]
          serde_json = "1"
          EOF
            cat > /tmp/probe-ci/src/lib.rs <<EOF
          pub fn v() -> serde_json::Value { serde_json::json!({"ok": true}) }
          EOF
            cd /tmp/probe-ci
            echo "== cargo build =="
            time cargo build
            echo "== sccache stats =="
            sccache --show-stats | grep -E 'Compile requests|Cache hits|Cache misses|Cache hits rate|Cache write'
          REMOTE

      - name: Destroy VM
        if: always()
        run: |
          VM_ID="${{ steps.vm.outputs.vm_id }}"
          if [ -n "$VM_ID" ] && [ "$VM_ID" != "null" ]; then
            curl -sf -X DELETE $FCCTL_URL/api/vms/$VM_ID && echo "VM $VM_ID destroyed" || echo "VM cleanup failed (non-fatal)"
          fi
