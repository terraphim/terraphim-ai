name: Fix macOS Runner Toolchain

on:
  workflow_dispatch:

jobs:
  fix-macos-toolchain:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Check current Rust toolchain
        run: |
          echo "Current default toolchain:"
          rustup default
          echo ""
          echo "Installed toolchains:"
          rustup toolchain list
          echo ""
          echo "Current rustc:"
          which rustc || echo "rustc not in PATH"
          rustc --version 2>&1 || echo "rustc failed"
          echo ""
          echo "Installed targets:"
          rustup target list --installed
          
      - name: Fix Rust toolchain
        run: |
          echo "Adding x86_64 target for cross-compilation..."
          rustup target add x86_64-apple-darwin
          
          echo ""
          echo "Installing x86_64 toolchain with force flag..."
          rustup toolchain install stable-x86_64-apple-darwin --force-non-host
          
          echo ""
          echo "Removing wrong Linux toolchain if present..."
          rustup toolchain uninstall stable-x86_64-unknown-linux-gnu 2>/dev/null || echo "Linux toolchain not found (good)"
          
          echo ""
          echo "Verification:"
          echo "Default toolchain:"
          rustup default
          echo ""
          echo "Installed targets:"
          rustup target list --installed
          echo ""
          echo "Rustc version:"
          rustc --version
          cargo --version
          
      - name: Test cross-compilation
        run: |
          echo "Testing cross-compilation to x86_64..."
          mkdir -p /tmp/test-rust
          cd /tmp/test-rust
          cat > main.rs << 'EOF'
          fn main() {
              println!("Hello from macOS runner!");
              println!("Target: {}", std::env::consts::ARCH);
          }
          EOF
          echo "Building for ARM64 (native)..."
          rustc main.rs -o test-arm64
          file test-arm64
          ./test-arm64
          echo ""
          echo "Building for x86_64 (cross-compile)..."
          rustc --target x86_64-apple-darwin main.rs -o test-x86_64
          file test-x86_64
          rm -rf /tmp/test-rust
          echo ""
          echo "Toolchain fix complete!"
