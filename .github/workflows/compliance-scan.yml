name: Compliance Scan

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  GITEA_URL: https://git.terraphim.cloud
  GITEA_REPO_OWNER: terraphim
  GITEA_REPO_NAME: terraphim-ai
  COMPLIANCE_LABEL_ID: "165"

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: [self-hosted, bigbox]
    timeout-minutes: 15

    steps:
      - name: Fix target directory permissions
        run: |
          if [ -d "target" ]; then
            sudo chown -R $(id -u):$(id -g) target 2>/dev/null || true
            sudo chmod -R u+rw target 2>/dev/null || true
          fi

      - uses: actions/checkout@v6

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny &>/dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: Run cargo deny check
        id: deny
        run: |
          set +e
          cargo deny check advisories bans licenses 2>&1 | tee /tmp/cargo-deny-output.txt
          DENY_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${DENY_EXIT}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Handle compliance pass
        if: steps.deny.outputs.exit_code == '0'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          EXISTING_ISSUE=$(curl -s \
            "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues?state=open&labels=${COMPLIANCE_LABEL_ID}&type=issues&limit=5" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            | python3 -c '
          import sys, json
          try:
              issues = json.load(sys.stdin)
          except Exception:
              issues = []
          if not isinstance(issues, list):
              issues = []
          for i in issues:
              print(i["number"])
              break
          ' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            curl -s -X POST \
              "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues/${EXISTING_ISSUE}/comments" \
              -H "Content-Type: application/json" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -d "{\"body\":\"Compliance scan PASSED on ${DATE}. Closing. [Run](${RUN_URL})\"}" > /dev/null
            curl -s -X PATCH \
              "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues/${EXISTING_ISSUE}" \
              -H "Content-Type: application/json" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -d '{"state":"closed"}' > /dev/null
            echo "Closed compliance issue #${EXISTING_ISSUE} -- scan is clean"
          else
            echo "Compliance scan PASSED -- no open issues to close"
          fi

      - name: Handle compliance failure
        if: steps.deny.outputs.exit_code != '0'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DENY_OUTPUT=$(cat /tmp/cargo-deny-output.txt 2>/dev/null | head -100 || echo "No output captured")

          EXISTING_ISSUE=$(curl -s \
            "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues?state=open&labels=${COMPLIANCE_LABEL_ID}&type=issues&limit=5" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            | python3 -c '
          import sys, json
          try:
              issues = json.load(sys.stdin)
          except Exception:
              issues = []
          if not isinstance(issues, list):
              issues = []
          for i in issues:
              print(i["number"])
              break
          ' 2>/dev/null || echo "")

          export DATE RUN_URL COMPLIANCE_LABEL_ID
          if [ -n "$EXISTING_ISSUE" ]; then
            COMMENT=$(python3 -c "
          import json, os
          body = 'Compliance scan still FAILING on ' + os.environ['DATE'] + '. Run: ' + os.environ['RUN_URL']
          print(json.dumps({'body': body}))
          ")
            curl -s -X POST \
              "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues/${EXISTING_ISSUE}/comments" \
              -H "Content-Type: application/json" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -d "$COMMENT" > /dev/null
            echo "Updated existing compliance issue #${EXISTING_ISSUE}"
          else
            ISSUE_JSON=$(python3 - <<'PYEOF'
          import json, os, sys
          deny_output = open('/tmp/cargo-deny-output.txt').read()[:3000] if os.path.exists('/tmp/cargo-deny-output.txt') else 'No output'
          date = os.environ.get('DATE', 'unknown')
          run_url = os.environ.get('RUN_URL', '')
          label_id = int(os.environ.get('COMPLIANCE_LABEL_ID', '165'))
          body = (
              "Compliance scan failure detected on " + date + "\n\n"
              "Run: " + run_url + "\n\n"
              "### cargo deny output\n\n"
              "```\n" + deny_output + "\n```\n\n"
              "### Resolution\n\n"
              "Review the failing advisories/bans/licences above and either:\n"
              "- Update deny.toml to ignore with documented justification\n"
              "- Update the dependency to a patched version\n"
              "- Remove the banned crate\n"
          )
          print(json.dumps({
              "title": "[Compliance] cargo deny failure " + date,
              "body": body,
              "labels": [label_id]
          }))
          PYEOF
          )
            NEW_ISSUE=$(curl -s -X POST \
              "${GITEA_URL}/api/v1/repos/${GITEA_REPO_OWNER}/${GITEA_REPO_NAME}/issues" \
              -H "Content-Type: application/json" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -d "$ISSUE_JSON" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("number","error"))')
            echo "Created compliance issue #${NEW_ISSUE}"
          fi
          # Fail the workflow so the run shows red in Actions tab
          exit 1
