name: Publish Benchmarks Snapshot to terraphim.ai

# Mirrors benchmark-results/snapshot.json into terraphim.ai as
# content/data/benchmarks.json via a pull request.
#
# Step 3 of Gitea zestic-ai/terraphim-ai #574.
# See .docs/design-ship-systems-benchmarks.md (in terraphim.ai repo).
#
# Required secret:
#   TERRAPHIM_AI_SITE_TOKEN - GitHub PAT with contents:write and
#                             pull-requests:write on terraphim/terraphim.ai.

on:
  push:
    branches:
      - main
    paths:
      - 'benchmark-results/snapshot.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Open PR on terraphim/terraphim.ai
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout terraphim-ai (source of snapshot)
        uses: actions/checkout@v4
        with:
          path: terraphim-ai

      - name: Verify snapshot exists
        run: |
          SNAPSHOT="terraphim-ai/benchmark-results/snapshot.json"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "ERROR: $SNAPSHOT missing; nothing to publish" >&2
            exit 1
          fi
          if ! jq empty "$SNAPSHOT"; then
            echo "ERROR: $SNAPSHOT is not valid JSON" >&2
            exit 1
          fi
          METRIC_COUNT="$(jq '.metrics | length' "$SNAPSHOT")"
          if [ "$METRIC_COUNT" -ne 6 ]; then
            echo "ERROR: expected 6 metrics, found $METRIC_COUNT" >&2
            exit 1
          fi
          echo "Snapshot OK ($METRIC_COUNT metrics)"

      - name: Checkout terraphim.ai (destination)
        uses: actions/checkout@v4
        with:
          repository: terraphim/terraphim.ai
          token: ${{ secrets.TERRAPHIM_AI_SITE_TOKEN }}
          path: terraphim-ai-site
          fetch-depth: 0

      - name: Compare snapshots
        id: diff
        run: |
          SRC="terraphim-ai/benchmark-results/snapshot.json"
          DST="terraphim-ai-site/content/data/benchmarks.json"
          if [ -f "$DST" ]; then
            if diff -q <(jq 'del(.generated_at)' "$SRC") <(jq 'del(.generated_at)' "$DST") > /dev/null; then
              echo "No substantive diff (only generated_at changed); skipping PR"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Substantive diff detected; will open PR"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Destination file missing; will create PR"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare branch and commit
        if: steps.diff.outputs.changed == 'true'
        working-directory: terraphim-ai-site
        env:
          SRC_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SRC_SHA:0:7}"
          BRANCH="benchmarks/sync-${SHORT_SHA}"

          git config user.name 'terraphim-benchmarks[bot]'
          git config user.email 'benchmarks@terraphim.ai'

          git checkout -b "$BRANCH"
          mkdir -p content/data
          cp ../terraphim-ai/benchmark-results/snapshot.json content/data/benchmarks.json

          git add content/data/benchmarks.json
          if git diff --cached --quiet; then
            echo "No changes to commit after copy; aborting" >&2
            exit 0
          fi

          git commit -m "chore(benchmarks): sync snapshot from terraphim-ai@${SHORT_SHA}" \
                     -m "Auto-generated by terraphim-ai publish-benchmarks-to-site workflow (run ${{ github.run_id }}). Source: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        working-directory: terraphim-ai-site
        env:
          GH_TOKEN: ${{ secrets.TERRAPHIM_AI_SITE_TOKEN }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_BODY="Automated snapshot sync from [terraphim-ai@${SHORT_SHA}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          Produced by \`.github/workflows/publish-benchmarks-to-site.yml\` after benchmark-results/snapshot.json changed on terraphim-ai main.

          Source workflow run: ${RUN_URL}

          Tracker: Gitea zestic-ai/terraphim-ai #574."

          gh pr create \
            --repo terraphim/terraphim.ai \
            --base main \
            --head "$BRANCH" \
            --title "chore(benchmarks): sync snapshot from terraphim-ai@${SHORT_SHA}" \
            --body "$PR_BODY" \
            --label benchmarks
