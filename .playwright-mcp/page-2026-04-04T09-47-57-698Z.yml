        - heading "Search StackOverflow" [level=1] [ref=e78]
        - paragraph [ref=e79]: source add stackoverflow rust tokio
        - heading "Search local filesystem" [level=1] [ref=e80]
        - paragraph [ref=e81]: "source add filesystem ~/code/ --recursive ```"
