        - heading "Import entire directory" [level=1] [ref=e71]
        - paragraph [ref=e72]: "import ~/Documents/knowledge-base/ ```"
        - 'heading "Step 5: Configure Data Sources" [level=2] [ref=e73]'
        - paragraph [ref=e74]: "Configure Terraphim to search different sources:"
        - paragraph [ref=e75]: "```bash"
        - heading "Search GitHub repositories" [level=1] [ref=e76]
