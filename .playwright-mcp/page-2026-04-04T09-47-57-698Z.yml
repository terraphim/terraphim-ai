        - heading "Quickstart Guide" [level=1] [ref=e35]
        - paragraph [ref=e36]: Get up and running with Terraphim AI in just 5 minutes.
        - 'heading "Step 1: Install Terraphim" [level=2] [ref=e37]'
        - paragraph [ref=e38]: "Choose your preferred installation method:"
        - 'heading "Option A: Universal Installer (Recommended)" [level=3] [ref=e39]'
        - paragraph [ref=e40]: "```bash"
        - heading "Single command installation with platform detection" [level=1] [ref=e41]
        - paragraph [ref=e42]: "curl -fsSL https://raw.githubusercontent.com/terraphim/terraphim-ai/main/scripts/install.sh | bash ```"
        - 'heading "Option B: Homebrew (Coming Soon)" [level=3] [ref=e43]'
        - paragraph [ref=e44]: Homebrew support is not yet available. Use the universal installer or Cargo instead.
        - 'heading "Option C: Cargo" [level=3] [ref=e45]'
        - code [ref=e47]: "# Install agent with interactive TUI cargo install terraphim-agent # Install CLI for automation cargo install terraphim-cli"
        - paragraph [ref=e48]:
          - link "Need more options?" [ref=e49] [cursor=pointer]:
            - /url: /docs/installation
        - 'heading "Step 2: Start Server" [level=2] [ref=e50]'
        - paragraph [ref=e51]: Terraphim server provides HTTP API and knowledge graph backend.
        - paragraph [ref=e52]: "```bash terraphim-server ```"
        - paragraph [ref=e53]: "By default, server runs on `http://localhost:8080`."
        - paragraph [ref=e54]: "You should see output like: ``` [INFO] Terraphim Server v1.5.2 starting... [INFO] Server listening on http://localhost:8080 [INFO] Knowledge graph initialized ```"
        - 'heading "Step 3: Use the Agent" [level=2] [ref=e55]'
        - paragraph [ref=e56]: "In a new terminal, start the interactive agent:"
        - code [ref=e58]: terraphim-agent
        - paragraph [ref=e59]: "You'll see a welcome message and can start typing commands:"
        - code [ref=e61]: "Terraphim AI Agent v1.5.2 Type 'help' for available commands > search rust async Found 12 results for 'rust async' > role engineer Role set to: Engineer (optimizing for technical depth) > search patterns Found 8 results for 'patterns'"
        - heading "Common Agent Commands" [level=2] [ref=e62]
        - paragraph [ref=e63]: "Here are the most useful commands to get started:"
        - code [ref=e65]: "> search <query> # Search knowledge graph > role <name> # Set search role (engineer, architect, etc.) > connect <term1> <term2> # Link two terms in knowledge graph > import <file> # Import markdown file into knowledge graph > export <format> # Export knowledge graph (json, csv) > status # Show server status and statistics > help # Show all available commands"
        - 'heading "Step 4: Import Your Content" [level=2] [ref=e66]'
        - paragraph [ref=e67]: "Import your markdown files or documentation:"
