        - heading "Quickstart Guide" [level=1] [ref=e35]
        - paragraph [ref=e36]: Get up and running with Terraphim AI in just 5 minutes.
        - 'heading "Step 1: Install Terraphim" [level=2] [ref=e37]'
        - paragraph [ref=e38]: "Choose your preferred installation method:"
        - 'heading "Option A: Universal Installer (Recommended)" [level=3] [ref=e39]'
        - code [ref=e41]: "# Single command installation with platform detection curl -fsSL https://raw.githubusercontent.com/terraphim/terraphim-ai/main/scripts/install.sh | bash"
        - 'heading "Option B: Homebrew (macOS/Linux)" [level=3] [ref=e42]'
        - code [ref=e44]: brew tap terraphim/terraphim && brew install terraphim-ai
        - 'heading "Option C: Cargo" [level=3] [ref=e45]'
        - code [ref=e47]: "# Install agent with interactive TUI cargo install terraphim-agent # Install CLI for automation cargo install terraphim-cli"
        - paragraph [ref=e48]:
          - link "Need more options?" [ref=e49] [cursor=pointer]:
            - /url: /docs/installation
        - 'heading "Step 2: Start Server" [level=2] [ref=e50]'
        - paragraph [ref=e51]: Terraphim server provides HTTP API and knowledge graph backend.
        - code [ref=e53]: terraphim_server
        - paragraph [ref=e54]:
          - text: By default, server runs on
          - code [ref=e55]: http://localhost:8080
          - text: .
        - paragraph [ref=e56]: "You should see output like:"
        - code [ref=e58]: "[INFO] Terraphim Server v1.15.0 starting... [INFO] Server listening on http://localhost:8080 [INFO] Knowledge graph initialized"
        - 'heading "Step 3: Use the Agent" [level=2] [ref=e59]'
        - paragraph [ref=e60]: "In a new terminal, start the interactive agent:"
        - code [ref=e62]: terraphim-agent
        - paragraph [ref=e63]: "You'll see a welcome message and can start typing commands:"
        - code [ref=e65]: "Terraphim AI Agent v1.15.0 Type 'help' for available commands > search rust async Found 12 results for 'rust async' > role engineer Role set to: Engineer (optimising for technical depth) > search patterns Found 8 results for 'patterns'"
        - heading "Common Agent Commands" [level=2] [ref=e66]
        - paragraph [ref=e67]: "Here are the most useful commands to get started:"
        - code [ref=e69]: "> search <query> # Search knowledge graph > role <name> # Set search role (engineer, architect, etc.) > connect <term1> <term2> # Link two terms in knowledge graph > import <file> # Import markdown file into knowledge graph > export <format> # Export knowledge graph (json, csv) > status # Show server status and statistics > help # Show all available commands"
        - 'heading "Step 4: Import Your Content" [level=2] [ref=e70]'
        - paragraph [ref=e71]: "Import your markdown files or documentation:"
        - code [ref=e73]: "# Import a single file import ~/notes/project-a.md # Import entire directory import ~/Documents/knowledge-base/"
        - 'heading "Step 5: Configure Data Sources" [level=2] [ref=e74]'
        - paragraph [ref=e75]: "Configure Terraphim to search different sources:"
        - code [ref=e77]: "# Search GitHub repositories source add github https://github.com/terraphim/terraphim-ai # Search StackOverflow source add stackoverflow rust tokio # Search local filesystem source add filesystem ~/code/ --recursive"
        - 'heading "Step 6: Explore Features" [level=2] [ref=e78]'
        - heading "Semantic Search" [level=3] [ref=e79]
        - code [ref=e81]: "> search how to implement async channels in rust"
        - heading "Role-Based Filtering" [level=3] [ref=e82]
        - code [ref=e84]: "> role architect > search system design patterns"
        - heading "Knowledge Graph Exploration" [level=3] [ref=e85]
        - code [ref=e87]: "> connect tokio async > show tokio"
        - heading "CLI Automation" [level=2] [ref=e88]
        - paragraph [ref=e89]: "For automation and scripting, use the CLI instead of REPL:"
        - code [ref=e91]: "# Search and get JSON output terraphim-cli search \"async patterns\" --format json # Import files programmatically terraphim-cli import ~/notes/*.md --recursive # Set role and search terraphim-cli search \"rust error handling\" --role engineer"
        - heading "Example Workflow" [level=2] [ref=e92]
        - paragraph [ref=e93]: "Here's a complete example workflow:"
        - code [ref=e95]: "# 1. Start the server (in one terminal) terraphim_server & # 2. Import your codebase (in another terminal) terraphim-agent > import ~/my-project/src/ # 3. Search for information > search error handling patterns # 4. Set role for better results > role senior-engineer # 5. Search again with role context > search error handling patterns # 6. Export results > export json > search-results.json"
