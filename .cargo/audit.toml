# Cargo audit configuration
# See: https://rustsec.org/advisories/
#
# Each ignored advisory MUST have a documented rationale explaining:
# - Why the advisory applies (dependency chain)
# - Why it is safe to ignore (scope, exploitability, or pending fix)
# - Resolution path (upgrade PR, upstream issue, or permanent exclusion)
#
# New advisories NOT in this list will fail the cargo-audit CI gate (--deny warnings).

[advisories]
ignore = [
    # RUSTSEC-2024-0370: proc-macro-error (original crate) unmaintained
    # - Transitive dependency from Tauri GTK stack (gtk3-macros, glib-macros)
    # - Cannot control this transitive dep; just an unmaintained warning.
    # - Resolution: Resolves when upgrading to Tauri v2
    "RUSTSEC-2024-0370",
    # RUSTSEC-2023-0071: RSA timing sidechannel
    # - Transitive from sqlx-mysql via opendal. No fixed version available.
    # - We do not use MySQL features directly. Severity: Medium (5.9). Low risk.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0049: rustls-webpki CRL revocation bypass
    # - Package: rustls-webpki 0.102.8
    # - Chain: serenity -> tokio-tungstenite -> tokio-rustls -> rustls 0.22 -> rustls-webpki 0.102
    # - serenity is OPTIONAL (discord feature), NOT in default features
    # - semver-incompatible with 0.103.x fix; blocked on serenity 0.13+
    # - Resolution: Remove once serenity 0.13+ releases with rustls 0.23+ support
    "RUSTSEC-2026-0049",
    # RUSTSEC-2026-0098: rustls-webpki name constraints for URI names incorrectly accepted
    # - Package: rustls-webpki 0.102.8 (via serenity 0.12.5 chain, same as RUSTSEC-2026-0049)
    # - serenity is OPTIONAL (discord feature), NOT in default features
    # - semver-incompatible with 0.103.x fix; blocked on serenity 0.13+
    "RUSTSEC-2026-0098",
    # RUSTSEC-2026-0099: rustls-webpki wildcard name constraints incorrectly accepted
    # - Package: rustls-webpki 0.102.8 (via serenity 0.12.5 chain, same as RUSTSEC-2026-0049/0098)
    # - serenity is OPTIONAL (discord feature), NOT in default features
    # - semver-incompatible with 0.103.x fix; blocked on serenity 0.13+
    "RUSTSEC-2026-0099",
    # RUSTSEC-2026-0097: rand unsound with custom logger using rand::rng()
    # - Affects rand 0.8.5 and 0.9.2 (transitive via various crates)
    # - Our codebase does not use custom loggers that call rand::rng()
    # - No practical exploit path in our usage
    "RUSTSEC-2026-0097",
    # RUSTSEC-2025-0141: bincode 1.3.3 unmaintained
    # - Used by terraphim_automata and heed-types (via fff-search)
    # - No known vulnerabilities, just unmaintained
    # - Resolution: Migrate to bincode 2.0 or postcard (tracked in backlog)
    "RUSTSEC-2025-0141",
    # RUSTSEC-2026-0104: rustls-webpki reachable panic in CRL parsing
    # - Package: rustls-webpki 0.102.8
    # - Chain: serenity -> tokio-tungstenite -> tokio-rustls -> rustls 0.22 -> rustls-webpki 0.102
    # - serenity is OPTIONAL (discord feature), NOT in default features; same root as 0049/0098/0099
    # - semver-incompatible with 0.103.x fix; blocked on serenity 0.13+
    "RUSTSEC-2026-0104",
    # RUSTSEC-2026-0185: quinn-proto 0.11.14 remote memory exhaustion (CVSS 7.5 High)
    # - Fix: upgrade to quinn-proto >=0.11.15
    # - PR #2950 tracks the upgrade; remove this entry once that PR is merged
    "RUSTSEC-2026-0185",
    # RUSTSEC-2024-0384: instant 0.1.13 is unmaintained
    # - Transitive dependency via indicatif -> self_update -> terraphim_update
    # - No known vulnerabilities; successor is web-time
    # - Blocked on upstream self_update updating its indicatif dependency
    "RUSTSEC-2024-0384",
    # RUSTSEC-2025-0119: number_prefix 0.4.0 is unmaintained
    # - Transitive dependency via indicatif -> self_update -> terraphim_update
    # - No known vulnerabilities, just unmaintained
    # - Blocked on upstream self_update/indicatif updating this dependency
    "RUSTSEC-2025-0119",
    # RUSTSEC-2024-0436: paste 1.0.15 is unmaintained
    # - Transitive proc-macro dependency via genai -> terraphim_service/terraphim_multi_agent
    # - No known vulnerabilities; author considers the crate feature-complete
    # - Blocked on genai updating its paste dependency
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0173: proc-macro-error2 2.0.1 is unmaintained
    # - Transitive proc-macro dependency used by various derive macros in the workspace
    # - No known vulnerabilities, just unmaintained
    # - Resolution: Transitive deps will update naturally as ecosystem migrates
    "RUSTSEC-2026-0173",
    # RUSTSEC-2020-0163: term_size 0.3.2 is unmaintained
    # - Old transitive terminal-utility dependency; successor is terminal_size
    # - No known vulnerabilities, just unmaintained
    # - Resolution: Transitive deps will update naturally
    "RUSTSEC-2020-0163",
    # RUSTSEC-2026-0183: git2 0.20.4 potential UB when calling Remote::list()
    # - Used directly in terraphim_gitea_runner for checkout and polling operations
    # - No fixed version of git2 available yet; upstream git2-rs is tracking this
    # - Our Remote::list() usage is read-only in controlled trusted environments
    # - Resolution: Upgrade git2 once a patch release is available
    "RUSTSEC-2026-0183",
    # RUSTSEC-2026-0184: git2 0.20.4 potential UB with Signature from buffer-created BlameHunk
    # - Same package as RUSTSEC-2026-0183; we do not use BlameHunk in our codebase
    # - No fixed version available; same upstream tracking issue
    # - Resolution: Upgrade git2 once a patch is released
    "RUSTSEC-2026-0184",
    # RUSTSEC-2026-0186: memmap2 0.9.10 unchecked pointer offset (unsound)
    # - Transitive dependency; fix is upgrade to memmap2 0.9.11
    # - PR #2950 tracks the upgrade to memmap2 0.9.11 + quinn-proto 0.11.15
    # - Resolution: Remove this entry once PR #2950 is merged
    "RUSTSEC-2026-0186",
]
