# RCH localhost worker requires single-factor pubkey auth from loopback.
# bigbox sshd globally requires "publickey,keyboard-interactive" (2FA);
# rch-wkr SSHes to alex@localhost and cannot satisfy keyboard-interactive,
# so we narrow the requirement for that specific source.
# See .docs/adr-rch-build-queue-not-firecracker-ci.md.
Match Address 127.0.0.1,::1 User alex
    AuthenticationMethods publickey
