# cargo-deny configuration for cargo-deny 0.19.0+
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
# unmaintained uses enum: "all", "workspace", "transitive", "none"
unmaintained = "workspace"
yanked = "warn"

ignore = [
    # term_size unmaintained - transitive dep via terraphim_validation v0.1.0 (no safe upgrade).
    # Previously flagged for removal but the crate is still in the dependency tree.
    # TODO: Replace with terminal_size once terraphim_validation migrates.
    "RUSTSEC-2020-0163",
    # Previously ignored entries removed (crates no longer in dependency graph):
    #   RUSTSEC-2023-0071 (rsa), RUSTSEC-2021-0145/2024-0375 (atty),
    #   RUSTSEC-2025-0141 (bincode), RUSTSEC-2021-0141 (dotenv),
    #   RUSTSEC-2026-0049/0098/0099 (rustls-webpki), RUSTSEC-2026-0097 (rand)
]

[licenses]
version = 2
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib",
    "MPL-2.0", "CC0-1.0", "Unicode-3.0", "Unicode-DFS-2016",
    "BSL-1.0", "0BSD", "OpenSSL",
    "Unlicense",
    "GPL-3.0-or-later",
    "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow specific git sources for our forks and security patches
allow-git = [
    "https://github.com/terraphim/rust-genai.git",
    "https://github.com/AlexMikhalev/self_update.git",
    # Security patch: tokio-tungstenite v0.28.0 pulls in rustls 0.23+ avoiding RUSTSEC-2026-0049
    "https://github.com/snapview/tokio-tungstenite.git",
    # Security patch: rustls-webpki 0.103.10 to fix RUSTSEC-2026-0049 (used by newer rustls)
    "https://github.com/rustls/webpki.git",
]
