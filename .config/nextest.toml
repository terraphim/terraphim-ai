[profile.default]
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

# Tight timeout for the known hang-class tests in terraphim_agent.
# Issue #1305: these tests spawn `cargo run … chat` via Command::output()
# with no timeout, blocking indefinitely when the LLM proxy is unreachable.
[[profile.default.overrides]]
filter = 'test(selected_role_tests)'
slow-timeout = { period = "10s", terminate-after = 1 }

[profile.ci]
test-threads = 4
