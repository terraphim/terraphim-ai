[profile.default]
fail-fast = false
# Per-test runaway ceiling (#2997): slow threshold = 60s, terminate-after = 2
# => runaway test terminated at 120s (60s threshold + 60s grace, <= #2997's
# 150s ceiling of "threshold + 90s"). Inherited by [profile.ci].
# Guarded by scripts/ci-check-nextest-timeout.sh.
slow-timeout = { period = "60s", terminate-after = 2 }

# Tight timeout for the known hang-class tests in terraphim_agent.
# Issue #1305: these tests spawn `cargo run … chat` via Command::output()
# with no timeout, blocking indefinitely when the LLM proxy is unreachable.
[[profile.default.overrides]]
filter = 'test(selected_role_tests)'
slow-timeout = { period = "10s", terminate-after = 1 }

# test_performance_and_limits runs 6 `cargo run` invocations sequentially.
# Pre-compiled builds take ~25 s each; allow up to 4 minutes total. (#1831)
[[profile.default.overrides]]
filter = 'test(test_performance_and_limits)'
slow-timeout = { period = "240s", terminate-after = 2 }
[profile.ci]
test-threads = 4
